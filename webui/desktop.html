<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, shrink-to-fit=no">
    <title>BioDockify Pharma AI</title>
    <link rel="icon" type="image/svg+xml" href="public/favicon.svg?v=4.5.3">
    <link rel="icon" type="image/svg+xml" href="favicon.svg?v=4.5.3">
    <link rel="stylesheet" href="index.css">
    <link rel="stylesheet" href="css/desktop.css">
    <!-- Google Icons -->
    <link rel="stylesheet" href="vendor/google/google-icons.css" />

    <script>
        globalThis.gitinfo = { version: "{{version_no}}", commit_time: "{{version_time}}" };
        globalThis.runtimeInfo = {
            ...(globalThis.runtimeInfo || {}),
            id: "{{runtime_id}}",
            isDevelopment: "{{runtime_is_development}}" === "true",
            loggedIn: "{{logged_in}}" === "true",
        };
    </script>
    <script type="module" src="js/initFw.js"></script>
    <script type="module" src="js/modals.js"></script>
    <script type="module" src="js/components.js"></script>
</head>
<body x-data="desktopApp">
    <div class="desktop-shell">
        <!-- Main Body — sidebar + workspace side by side -->
        <div class="desktop-body">
            <!-- Sidebar -->
            <div class="desktop-sidebar">
                <div class="desktop-sidebar-header">
                    <div class="logo">BioDockify AI</div>
                </div>
                <div class="desktop-sidebar-nav">
                    <div class="nav-section-title">Pharma Research</div>
                    <button class="nav-item" @click="openTool('research-hub')">
                        <span class="material-symbols-outlined">apps</span>
                        <span>All Tools</span>
                    </button>
                    <button class="nav-item" @click="openTool('statistics')">
                        <span class="material-symbols-outlined">analytics</span>
                        <span>Statistics</span>
                    </button>
                    <button class="nav-item" @click="openTool('drug-properties')">
                        <span class="material-symbols-outlined">medication</span>
                        <span>Drug Properties</span>
                    </button>
                    <button class="nav-item" @click="openTool('admet')">
                        <span class="material-symbols-outlined">monitor_heart</span>
                        <span>ADMET</span>
                    </button>
                    <button class="nav-item" @click="openTool('docking')">
                        <span class="material-symbols-outlined">biotech</span>
                        <span>Docking</span>
                    </button>
                    <button class="nav-item" @click="openTool('knowledge')">
                        <span class="material-symbols-outlined">psychology</span>
                        <span>Knowledge</span>
                    </button>

                    <div class="nav-section-title">Intelligence</div>
                    <button class="nav-item" @click="openTool('patent-analyzer')">
                        <span class="material-symbols-outlined">gavel</span>
                        <span>Patents</span>
                    </button>
                    <button class="nav-item" @click="openTool('trial-scanner')">
                        <span class="material-symbols-outlined">clinical_notes</span>
                        <span>Trials</span>
                    </button>
                    <button class="nav-item" @click="openTool('backup-recovery')">
                        <span class="material-symbols-outlined">backup</span>
                        <span>Backup</span>
                    </button>
                </div>
                <div class="desktop-sidebar-footer">
                    <button class="nav-item" @click="openModal('settings/settings.html')">
                        <span class="material-symbols-outlined">settings</span>
                        <span>Settings</span>
                    </button>
                </div>
            </div>

            <!-- Workspace -->
            <div class="desktop-workspace">
                <!-- Tab Bar -->
                <div class="tab-bar">
                    <button class="tab-item" :class="{active: activeTab === 'chat'}" @click="activeTab = 'chat'; closeTool()">
                        <span class="material-symbols-outlined">chat</span>
                        <span>Chat</span>
                    </button>
                    <template x-if="activeToolName">
                        <button class="tab-item active">
                            <span class="material-symbols-outlined" x-text="activeToolIcon || 'widgets'"></span>
                            <span x-text="activeToolName"></span>
                            <button class="tab-close" @click.stop="closeTool()">×</button>
                        </button>
                    </template>
                </div>

                <!-- Content Area -->
                <div class="desktop-content">
                    <!-- Chat Panel -->
                    <div id="right-panel" class="panel" x-show="activeTab === 'chat'" x-cloak>
                        <x-component path="chat/top-section/chat-top.html"></x-component>
                        <div id="chat-area-wrapper" x-data>
                            <div x-show="$store.welcomeStore && $store.welcomeStore.isVisible" style="height:100%;">
                                <x-component path="welcome/welcome-screen.html"></x-component>
                            </div>
                            <div id="chat-history" x-show="!$store.welcomeStore || !$store.welcomeStore.isVisible"></div>
                        </div>
                        <div x-show="!$store.welcomeStore || !$store.welcomeStore.isVisible">
                            <x-component path="chat/input/progress.html"></x-component>
                            <x-component path="chat/input/chat-bar.html"></x-component>
                        </div>
                    </div>

                    <!-- Tool Panel -->
                    <div class="tool-fullpage" x-show="activeTab === 'tool' && activeTool" x-cloak>
                        <div class="tool-fullpage-content">
                            <x-extension id="right-canvas-panels"></x-extension>
                        </div>
                    </div>
                </div>
            </div>
        </div>

        <!-- Status Bar -->
        <div class="status-bar">
            <div class="status-bar-left">
                <span class="status-indicator">
                    <span class="status-dot"></span>
                    <span>Ready</span>
                </span>
                <span x-show="activeToolName" x-text="'Tool: ' + activeToolName"></span>
            </div>
            <div class="status-bar-right">
                <span x-text="'v' + (globalThis.gitinfo?.version?.replace('v','') || '4.5.3')"></span>
            </div>
        </div>
    </div>

    <script>
        // Desktop app state
        document.addEventListener('alpine:init', () => {
            Alpine.data('desktopApp', () => ({
                activeTab: 'chat',
                activeTool: null,
                activeToolName: '',
                activeToolIcon: '',

                openTool(id) {
                    this.activeTab = 'tool';
                    this.activeTool = id;
                    const tools = {
                        'research-hub': { name: 'All Tools', icon: 'apps' },
                        'statistics': { name: 'Statistics', icon: 'analytics' },
                        'drug-properties': { name: 'Drug Properties', icon: 'medication' },
                        'admet': { name: 'ADMET', icon: 'monitor_heart' },
                        'docking': { name: 'Docking', icon: 'biotech' },
                        'knowledge': { name: 'Knowledge', icon: 'psychology' },
                        'patent-analyzer': { name: 'Patents', icon: 'gavel' },
                        'trial-scanner': { name: 'Trials', icon: 'clinical_notes' },
                        'backup-recovery': { name: 'Backup', icon: 'backup' },
                    };
                    const tool = tools[id] || { name: id, icon: 'widgets' };
                    this.activeToolName = tool.name;
                    this.activeToolIcon = tool.icon;
                    const canvas = Alpine.store('rightCanvas');
                    if (canvas) {
                        canvas.isOpen = true;
                        canvas.activeSurfaceId = id;
                        canvas.markSurfaceMounted(id);
                    }
                },

                closeTool() {
                    this.activeTab = 'chat';
                    this.activeTool = null;
                    this.activeToolName = '';
                    this.activeToolIcon = '';
                    const canvas = Alpine.store('rightCanvas');
                    if (canvas) {
                        canvas.isOpen = false;
                        if (canvas.close) canvas.close();
                    }
                }
            }));
        });

        // Keyboard shortcuts
        document.addEventListener('keydown', function(e) {
            if ((e.ctrlKey || e.metaKey) && e.key === 'n') {
                e.preventDefault();
                if (window.deselectChat) window.deselectChat();
            }
            if (e.key === 'Escape') {
                var el = document.querySelector('[x-data]');
                if (el && el.__x) {
                    var data = el.__x.getData();
                    if (data.activeTab === 'tool') data.closeTool();
                }
            }
        });

        // Load canvas store for surface registration
        import('/components/canvas/right-canvas-store.js').then(mod => {
            var store = mod.store;
            if (store && typeof store.init === 'function') {
                store.init().catch(function(err) {
                    console.error('Canvas init failed:', err);
                });
            }
        });
    </script>
</body>
</html>
