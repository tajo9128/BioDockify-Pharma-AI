<html>
<head></head>
<body>
  <div x-data class="desktop-panel">
    <div class="desktop-toolbar">
      <span class="desktop-label">Kali Linux Desktop</span>
      <div class="desktop-actions">
        <button class="dt-btn" onclick="document.querySelector('.desktop-iframe').src += ''" title="Refresh">
          <span class="material-symbols-outlined">refresh</span>
        </button>
        <a class="dt-btn" href="/desktop" target="_blank" title="Open in new tab">
          <span class="material-symbols-outlined">open_in_new</span>
        </a>
      </div>
    </div>
    <div class="desktop-error" id="desktop-error" style="display:none">
      <p>Kali Desktop session not available. Try opening in a new tab or check if the VNC service is running.</p>
    </div>
    <iframe src="/desktop" class="desktop-iframe" frameborder="0" 
      onerror="document.getElementById('desktop-error').style.display='flex'"
      onload="this.style.display='block';document.getElementById('desktop-error').style.display='none'"></iframe>
    <style>
      .desktop-panel { display: flex; flex-direction: column; width: 100%; height: 100%; overflow: hidden; background: #1a1a2e; }
      .desktop-toolbar { display: flex; align-items: center; justify-content: space-between; padding: 4px 12px; background: #0f0f23; border-bottom: 1px solid #2a2a4a; flex-shrink: 0; }
      .desktop-label { font-size: 0.68rem; color: #a0a0b0; font-weight: 500; }
      .desktop-actions { display: flex; gap: 4px; }
      .dt-btn { display: flex; align-items: center; justify-content: center; width: 28px; height: 28px; padding: 0; background: transparent; border: 1px solid #2a2a4a; border-radius: 4px; color: #a0a0b0; cursor: pointer; text-decoration: none; }
      .dt-btn:hover { background: #2a2a4a; color: #fff; }
      .dt-btn .material-symbols-outlined { font-size: 16px; }
      .desktop-iframe { flex: 1; width: 100%; border: none; display: none; }
      .desktop-error { display: flex; align-items: center; justify-content: center; flex: 1; color: #a0a0b0; font-size: 0.72rem; text-align: center; padding: 20px; }
    </style>
  </div>
</body>
</html>
