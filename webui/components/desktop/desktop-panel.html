<html>
<head></head>
<body>
  <div x-data class="desktop-panel">
    <div class="desktop-msg">
      <span class="material-symbols-outlined desktop-msg-icon">desktop_windows</span>
      <h3>Kali Linux Desktop</h3>
      <p>The Kali desktop environment is available on the host machine.</p>
      <p class="desktop-msg-hint">Open <code>http://localhost:50001/desktop</code> in a new browser tab or access the Kali terminal via <code>docker exec -it biodockify-pharma-ai bash</code></p>
    </div>
    <style>
      .desktop-panel { display: flex; align-items: center; justify-content: center; width: 100%; height: 100%; background: #1a1a2e; padding: 20px; }
      .desktop-msg { text-align: center; color: #a0a0b0; max-width: 400px; }
      .desktop-msg-icon { font-size: 48px; color: var(--color-primary); margin-bottom: 12px; display: block; }
      .desktop-msg h3 { color: #fff; font-size: 0.95rem; margin: 0 0 8px 0; }
      .desktop-msg p { font-size: 0.72rem; line-height: 1.5; margin: 0 0 6px 0; }
      .desktop-msg-hint { font-size: 0.62rem; color: #666; }
      .desktop-msg code { background: #0f0f23; padding: 2px 6px; border-radius: 3px; font-size: 0.62rem; color: var(--color-primary); }
    </style>
  </div>
</body>
</html>
