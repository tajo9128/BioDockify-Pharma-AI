<html>
<head>
  <script type="module" src="/components/research-dashboard/research-store.js"></script>
</head>
<body>
  <div x-data class="rd-panel" x-init="$store.researchDashboard.init()">
    <div class="rd-header">
      <span class="material-symbols-outlined rd-icon">science</span>
      <h2>Research Command Center</h2>
    </div>

    <div class="rd-tabs">
      <button class="rd-tab" :class="{active: $store.researchDashboard.activeTab === 'projects'}" @click="$store.researchDashboard.activeTab = 'projects'">Projects</button>
      <button class="rd-tab" :class="{active: $store.researchDashboard.activeTab === 'pipeline'}" @click="$store.researchDashboard.activeTab = 'pipeline'; $store.researchDashboard.loadDashboard()" :disabled="!$store.researchDashboard.activeProjectId">Pipeline</button>
    </div>

    <div x-show="$store.researchDashboard.error" class="rd-error" x-text="$store.researchDashboard.error"></div>
    <div x-show="$store.researchDashboard.message" class="rd-msg" x-text="$store.researchDashboard.message"></div>

    <!-- Projects Tab -->
    <div x-show="$store.researchDashboard.activeTab === 'projects'">
      <div class="rd-card">
        <h4>Start New Research</h4>
        <div class="rd-new-row">
          <input type="text" x-model="$store.researchDashboard.newTopic" placeholder="Enter PhD title..." class="rd-input" @keyup.enter="$store.researchDashboard.startResearch()" />
          <select x-model="$store.researchDashboard.newType" class="rd-select-sm">
            <option value="phd">PhD</option><option value="grand">Grand Research</option>
            <option value="review_article">Review</option><option value="general">General</option>
          </select>
          <button class="rd-btn" @click="$store.researchDashboard.startResearch()" :disabled="$store.researchDashboard.loading || !$store.researchDashboard.newTopic">Start</button>
        </div>
      </div>

      <template x-if="$store.researchDashboard.projects.length">
        <div class="rd-card">
          <h4>Projects (<span x-text="$store.researchDashboard.projects.length"></span>)</h4>
          <template x-for="p in $store.researchDashboard.projects" :key="p.research_id">
            <div class="rd-proj" :class="{selected: $store.researchDashboard.activeProjectId === p.research_id}" @click="$store.researchDashboard.selectProject(p.research_id)">
              <div class="rd-proj-head">
                <span class="rd-proj-title" x-text="p.topic || p.title || 'Untitled'"></span>
                <span class="rd-proj-type" x-text="p.research_type"></span>
              </div>
              <div class="rd-bar"><div class="rd-fill" :style="'width:' + Math.round((p.progress||0)*100) + '%'"></div></div>
              <span class="rd-pct" x-text="Math.round((p.progress||0)*100) + '%'"></span>
            </div>
          </template>
        </div>
      </template>
    </div>

    <!-- Pipeline Tab -->
    <div x-show="$store.researchDashboard.activeTab === 'pipeline'">
      <template x-if="$store.researchDashboard.activeProject">
        <div>
          <div class="rd-card">
            <div class="rd-proj-head">
              <span x-text="$store.researchDashboard.activeProject.topic || $store.researchDashboard.activeProject.title"></span>
              <button class="rd-btn-sm" @click="$store.researchDashboard.exportReport()">Export</button>
            </div>
            <div class="rd-bar big"><div class="rd-fill" :style="'width:' + $store.researchDashboard.progressPct + '%'" x-text="$store.researchDashboard.progressPct + '%'"></div></div>
          </div>

          <div class="rd-card" x-show="$store.researchDashboard.dashboard?.tasks?.length">
            <h4>Tasks</h4>
            <template x-for="t in $store.researchDashboard.dashboard.tasks" :key="t.id">
              <div class="rd-task"><span x-text="t.status === 'completed' ? '✅' : t.status === 'in_progress' ? '🔄' : '⬜'"></span> <span x-text="t.title || t.id"></span></div>
            </template>
          </div>

          <div class="rd-card" x-show="$store.researchDashboard.dashboard?.milestones?.length">
            <h4>Milestones</h4>
            <template x-for="m in $store.researchDashboard.dashboard.milestones" :key="m.milestone_id">
              <div class="rd-ms"><span class="rd-ms-dot" :style="'background:' + (m.status === 'completed' ? '#22c55e' : m.status === 'in_progress' ? '#4fc3f7' : '#555')"></span><span x-text="m.title"></span><span class="rd-ms-pct" x-text="Math.round((m.progress||0)*100) + '%'"></span></div>
            </template>
          </div>

          <div class="rd-card" x-show="$store.researchDashboard.dashboard?.wetlab_summary">
            <h4>Wet Lab</h4>
            <div class="rd-stats">
              <span x-text="'Total: ' + ($store.researchDashboard.dashboard.wetlab_summary.total || 0)"></span>
              <span x-text="'Completed: ' + ($store.researchDashboard.dashboard.wetlab_summary.completed || 0)"></span>
            </div>
          </div>
        </div>
      </template>
      <div x-show="!$store.researchDashboard.activeProjectId" class="rd-empty">Select a project first</div>
    </div>

    <style>
      .rd-panel { display: flex; flex-direction: column; height: 100%; overflow-y: auto; padding: 12px 14px; background: var(--color-background); }
      .rd-header { display: flex; align-items: center; gap: 8px; margin-bottom: 8px; }
      .rd-icon { font-size: 22px; color: var(--color-primary); }
      .rd-header h2 { font-size: 0.9rem; margin: 0; font-weight: 700; color: var(--color-primary); }
      .rd-tabs { display: flex; gap: 2px; margin-bottom: 8px; }
      .rd-tab { padding: 5px 12px; background: var(--color-panel); border: 1px solid var(--color-border); border-radius: 4px 4px 0 0; color: var(--color-text-muted); cursor: pointer; font-size: 0.66rem; }
      .rd-tab.active { background: var(--color-primary); color: white; border-color: var(--color-primary); }
      .rd-tab:disabled { opacity: 0.4; cursor: not-allowed; }
      .rd-error { padding: 5px 8px; background: rgba(255,107,107,0.1); border-radius: 4px; color: var(--color-error-text); font-size: 0.6rem; margin-bottom: 6px; }
      .rd-msg { padding: 5px 8px; background: rgba(0,212,170,0.08); border-radius: 4px; color: var(--color-primary); font-size: 0.6rem; margin-bottom: 6px; }
      .rd-card { padding: 10px 12px; background: var(--color-panel); border: 1px solid var(--color-border); border-radius: 6px; margin-bottom: 6px; }
      .rd-card h4 { font-size: 0.64rem; font-weight: 600; color: var(--color-text-muted); margin: 0 0 6px 0; }
      .rd-new-row { display: flex; gap: 5px; }
      .rd-input { flex: 1; padding: 6px 8px; border: 1px solid var(--color-border); border-radius: 5px; background: var(--color-background); color: var(--color-text); font-size: 0.64rem; }
      .rd-input:focus { outline: none; border-color: var(--color-primary); }
      .rd-select-sm { padding: 5px 8px; border: 1px solid var(--color-border); border-radius: 5px; background: var(--color-background); color: var(--color-text); font-size: 0.62rem; }
      .rd-btn { padding: 6px 12px; background: var(--color-primary); color: white; border: none; border-radius: 5px; cursor: pointer; font-size: 0.62rem; font-weight: 600; }
      .rd-btn:disabled { opacity: 0.5; }
      .rd-btn-sm { padding: 3px 8px; background: var(--color-panel); border: 1px solid var(--color-border); border-radius: 4px; color: var(--color-text); cursor: pointer; font-size: 0.58rem; }
      .rd-proj { padding: 8px 10px; background: var(--color-background); border: 1px solid var(--color-border); border-radius: 5px; margin-bottom: 4px; cursor: pointer; }
      .rd-proj.selected { border-color: var(--color-primary); }
      .rd-proj-head { display: flex; justify-content: space-between; align-items: center; margin-bottom: 4px; }
      .rd-proj-title { font-size: 0.66rem; font-weight: 600; color: var(--color-text); }
      .rd-proj-type { font-size: 0.54rem; color: var(--color-primary); }
      .rd-bar { height: 6px; background: var(--color-border); border-radius: 3px; overflow: hidden; margin-bottom: 2px; }
      .rd-bar.big { height: 16px; border-radius: 8px; }
      .rd-fill { height: 100%; background: var(--color-primary); border-radius: 3px; transition: width 0.3s; }
      .rd-bar.big .rd-fill { font-size: 0.55rem; color: white; display: flex; align-items: center; justify-content: flex-end; padding-right: 6px; font-weight: 700; }
      .rd-pct { font-size: 0.55rem; color: var(--color-text-muted); }
      .rd-task { display: flex; gap: 6px; font-size: 0.6rem; color: var(--color-text); padding: 2px 0; }
      .rd-ms { display: flex; align-items: center; gap: 6px; padding: 3px 0; font-size: 0.6rem; color: var(--color-text); }
      .rd-ms-dot { width: 7px; height: 7px; border-radius: 50%; flex-shrink: 0; }
      .rd-ms-pct { margin-left: auto; font-size: 0.55rem; color: var(--color-text-muted); }
      .rd-stats { display: flex; gap: 10px; font-size: 0.6rem; color: var(--color-text-muted); }
      .rd-empty { padding: 20px; text-align: center; font-size: 0.66rem; color: var(--color-text-muted); }
    </style>
  </div>
</body>
</html>
