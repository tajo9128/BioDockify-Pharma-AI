<html>

<head>
    <script type="module">
        import { store } from "/components/welcome/welcome-store.js";
        import { store as chatsStore } from "/components/sidebar/chats/chats-store.js";
        import { store as projectsStore } from "/components/projects/projects-store.js";
    </script>
</head>

<body>
    <div x-data>
        <template x-if="$store.welcomeStore">
            <div class="welcome-container">
                <!-- Header -->
                <div class="welcome-header">
                    <div class="welcome-logo-card">
                        <img src="public/icon.svg" alt="BioDockify AI" class="welcome-logo-img" onerror="this.style.display='none'" />
                        <svg class="welcome-logo-icon" viewBox="0 0 960 960" width="80" height="80">
                            <defs>
                                <linearGradient id="g" x1="0%" y1="0%" x2="100%" y2="100%">
                                    <stop offset="0%" style="stop-color:#00d4aa"/>
                                    <stop offset="100%" style="stop-color:#00897b"/>
                                </linearGradient>
                            </defs>
                            <rect width="960" height="960" rx="180" fill="url(#g)"/>
                            <circle cx="480" cy="280" r="80" fill="#0a1929"/>
                            <circle cx="340" cy="480" r="80" fill="#0a1929"/>
                            <circle cx="620" cy="480" r="80" fill="#0a1929"/>
                            <circle cx="480" cy="680" r="80" fill="#0a1929"/>
                        </svg>
                    </div>
                    <h1 class="welcome-title">BioDockify AI</h1>
                    <p class="welcome-version">v6.0.0 — BioDockify Pharma AI</p>
                </div>

                <!-- Quick Actions -->
                <div class="welcome-actions">
                    <button class="action-btn primary" @click="$store.chats.newChat()">
                        <span class="material-symbols-outlined">add_comment</span>
                        <span>New Chat</span>
                    </button>
                </div>

                <!-- Feature Grid - Core interactive tools -->
                <div class="feature-grid">
                    <button class="feature-btn" @click="$store.desktopWorkspace?.openWindow('research-dashboard')">
                        <span class="material-symbols-outlined">rocket_launch</span>
                        <span>Research CMD</span>
                    </button>
                    <button class="feature-btn" @click="$store.desktopWorkspace?.openWindow('molecular-toolkit')">
                        <span class="material-symbols-outlined">biotech</span>
                        <span>Mol Toolkit</span>
                    </button>
                    <button class="feature-btn" @click="$store.desktopWorkspace?.openWindow('statistics')">
                        <span class="material-symbols-outlined">analytics</span>
                        <span>Statistics</span>
                    </button>
                    <button class="feature-btn" @click="$store.desktopWorkspace?.openWindow('literature')">
                        <span class="material-symbols-outlined">menu_book</span>
                        <span>Literature</span>
                    </button>
                    <button class="feature-btn" @click="$store.desktopWorkspace?.openWindow('drug-properties')">
                        <span class="material-symbols-outlined">medication</span>
                        <span>Drug Props</span>
                    </button>
                    <button class="feature-btn" @click="$store.desktopWorkspace?.openWindow('thesis')">
                        <span class="material-symbols-outlined">description</span>
                        <span>Writer</span>
                    </button>
                    <button class="feature-btn" @click="$store.desktopWorkspace?.openWindow('faculty-dashboard')">
                        <span class="material-symbols-outlined">school</span>
                        <span>Faculty CMD</span>
                    </button>
                    <button class="feature-btn" @click="$store.desktopWorkspace?.openWindow('journal-finder')">
                        <span class="material-symbols-outlined">verified</span>
                        <span>J. Finder</span>
                    </button>
                    <button class="feature-btn" @click="$store.desktopWorkspace?.openWindow('knowledge')">
                        <span class="material-symbols-outlined">psychology</span>
                        <span>Knowledge</span>
                    </button>
                    <button class="feature-btn" @click="$store.desktopWorkspace?.openWindow('research')">
                        <span class="material-symbols-outlined">apps</span>
                        <span>All Tools</span>
                    </button>
                </div>

                <!-- Quick Links -->
                <div class="quick-links">
                    <button class="link-btn" @click="openModal('settings/settings.html')">
                        <span class="material-symbols-outlined">settings</span>
                        <span>Settings</span>
                    </button>
                    <button class="link-btn" @click="openModal('components/modals/scheduler/scheduler-modal.html')">
                        <span class="material-symbols-outlined">schedule</span>
                        <span>Tasks</span>
                    </button>
                    <button class="link-btn" @click="projectsStore.openProjectsModal()">
                        <span class="material-symbols-outlined">folder</span>
                        <span>Projects</span>
                    </button>
                    <button class="link-btn" @click="openModal('settings/backup/backup_restore.html')">
                        <span class="material-symbols-outlined">backup</span>
                        <span>Backup</span>
                    </button>
                    <button class="link-btn" @click="$store.desktopWorkspace?.cycleLayout()">
                        <span class="material-symbols-outlined">desktop_windows</span>
                        <span>Desktop</span>
                    </button>
                </div>
            </div>
        </template>
    </div>

    <style>
        .welcome-container {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100%;
            width: 100%;
            padding: 2rem;
            background: var(--color-background);
            overflow-y: auto;
        }

        .welcome-header {
            text-align: center;
            margin-bottom: 2rem;
        }

        .welcome-logo-card {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            width: 100px;
            height: 100px;
            background: rgba(255,255,255,0.06);
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 24px;
            padding: 16px;
            margin-bottom: 1rem;
            box-shadow: 0 8px 32px rgba(0,0,0,0.2);
        }

        .welcome-logo-img {
            width: 64px;
            height: 64px;
        }

        .welcome-logo-icon {
            width: 64px;
            height: 64px;
            display: none;
        }

        .welcome-logo-img[src=""] + .welcome-logo-icon,
        img.welcome-logo-img[style*="display: none"] ~ .welcome-logo-icon {
            display: block;
        }

        .welcome-logo {
            width: 80px;
            height: 80px;
            margin-bottom: 1rem;
        }

        .welcome-title {
            font-size: 1.75rem;
            font-weight: 700;
            color: var(--color-primary);
            margin: 0;
        }

        .welcome-version {
            font-size: 0.85rem;
            color: var(--color-text-muted);
            margin: 0.5rem 0 0 0;
        }

        .welcome-actions {
            margin-bottom: 2rem;
        }

        .action-btn {
            display: flex;
            align-items: center;
            gap: 0.5rem;
            padding: 0.75rem 1.5rem;
            border-radius: 8px;
            font-size: 1rem;
            cursor: pointer;
            transition: all 0.2s;
            border: none;
        }

        .action-btn.primary {
            background: var(--color-primary);
            color: #0a1929;
        }

        .action-btn.primary:hover {
            opacity: 0.9;
        }

        .feature-grid {
            display: grid;
            grid-template-columns: repeat(5, 1fr);
            gap: 0.75rem;
            margin-bottom: 2rem;
            max-width: 600px;
        }

        .feature-btn {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 0.25rem;
            padding: 1rem 0.75rem;
            background: var(--color-panel);
            border: 1px solid var(--color-border);
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.2s;
        }

        .feature-btn:hover {
            border-color: var(--color-primary);
            background: var(--color-message-bg);
        }

        .feature-btn .material-symbols-outlined {
            font-size: 1.5rem;
            color: var(--color-primary);
        }

        .feature-btn span:last-child {
            font-size: 0.75rem;
            color: var(--color-text);
        }

        .quick-links {
            display: flex;
            gap: 1rem;
        }

        .link-btn {
            display: flex;
            align-items: center;
            gap: 0.25rem;
            padding: 0.5rem 1rem;
            background: transparent;
            border: 1px solid var(--color-border);
            border-radius: 6px;
            cursor: pointer;
            color: var(--color-text-muted);
            font-size: 0.85rem;
            transition: all 0.2s;
        }

        .link-btn:hover {
            border-color: var(--color-primary);
            color: var(--color-text);
        }

        .link-btn .material-symbols-outlined {
            font-size: 1rem;
        }

        @media (max-width: 640px) {
            .feature-grid {
                grid-template-columns: repeat(2, 1fr);
            }
            .quick-links {
                flex-wrap: wrap;
                justify-content: center;
            }
        }
    </style>
</body>

</html>
