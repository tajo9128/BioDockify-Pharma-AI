<html>

<head>
    <script type="module">
        import { store } from "/components/welcome/welcome-store.js";
        import { store as chatsStore } from "/components/sidebar/chats/chats-store.js";
        import { store as projectsStore } from "/components/projects/projects-store.js";
    </script>
</head>

<body>
    <div x-data>
        <template x-if="$store.welcomeStore">
            <div class="welcome-container">
                <!-- Header -->
                <div class="welcome-header">
                    <svg class="welcome-logo" viewBox="0 0 960 960">
                        <defs>
                            <linearGradient id="g" x1="0%" y1="0%" x2="100%" y2="100%">
                                <stop offset="0%" style="stop-color:#00d4aa"/>
                                <stop offset="100%" style="stop-color:#00897b"/>
                            </linearGradient>
                        </defs>
                        <rect width="960" height="960" rx="160" fill="url(#g)"/>
                        <circle cx="480" cy="280" r="80" fill="#0a1929"/>
                        <circle cx="340" cy="480" r="80" fill="#0a1929"/>
                        <circle cx="620" cy="480" r="80" fill="#0a1929"/>
                        <circle cx="480" cy="680" r="80" fill="#0a1929"/>
                    </svg>
                    <h1 class="welcome-title">BioDockify AI</h1>
                    <p class="welcome-version">v1.57 - Pharmaceutical Research Assistant</p>
                </div>

                <!-- Quick Actions -->
                <div class="welcome-actions">
                    <button class="action-btn primary" @click="$store.chats.newChat()">
                        <span class="material-symbols-outlined">add_comment</span>
                        <span>New Chat</span>
                    </button>
                </div>

                <!-- Feature Grid -->
                <div class="feature-grid">
                    <button class="feature-btn" @click="openModal('components/research/research-tools.html')">
                        <span class="material-symbols-outlined">science</span>
                        <span>Research Tools</span>
                    </button>
                    <button class="feature-btn" @click="openModal('components/statistics/statistics-modal.html')">
                        <span class="material-symbols-outlined">analytics</span>
                        <span>Statistics</span>
                    </button>
                    <button class="feature-btn" @click="openModal('components/literature/literature-modal.html')">
                        <span class="material-symbols-outlined">menu_book</span>
                        <span>Literature</span>
                    </button>
                    <button class="feature-btn" @click="openModal('components/thesis/thesis-modal.html')">
                        <span class="material-symbols-outlined">description</span>
                        <span>Thesis</span>
                    </button>
                    <button class="feature-btn" @click="openModal('components/slides/slides-modal.html')">
                        <span class="material-symbols-outlined">slideshow</span>
                        <span>Slides</span>
                    </button>
                    <button class="feature-btn" @click="openModal('components/wetlab/wetlab-modal.html')">
                        <span class="material-symbols-outlined">biotech</span>
                        <span>Wet Lab</span>
                    </button>
                    <button class="feature-btn" @click="openModal('components/knowledge/knowledge-modal.html')">
                        <span class="material-symbols-outlined">psychology</span>
                        <span>Knowledge</span>
                    </button>
                    <button class="feature-btn" @click="openModal('components/plugins/list/plugin-list.html')">
                        <span class="material-symbols-outlined">extension</span>
                        <span>Plugins</span>
                    </button>
                </div>

                <!-- Quick Links -->
                <div class="quick-links">
                    <button class="link-btn" @click="openModal('settings/settings.html')">
                        <span class="material-symbols-outlined">settings</span>
                        <span>Settings</span>
                    </button>
                    <button class="link-btn" @click="openModal('components/modals/scheduler/scheduler-modal.html')">
                        <span class="material-symbols-outlined">schedule</span>
                        <span>Tasks</span>
                    </button>
                    <button class="link-btn" @click="projectsStore.openProjectsModal()">
                        <span class="material-symbols-outlined">folder</span>
                        <span>Projects</span>
                    </button>
                </div>
            </div>
        </template>
    </div>

    <style>
        .welcome-container {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100%;
            width: 100%;
            padding: 2rem;
            background: var(--color-background);
            overflow-y: auto;
        }

        .welcome-header {
            text-align: center;
            margin-bottom: 2rem;
        }

        .welcome-logo {
            width: 80px;
            height: 80px;
            margin-bottom: 1rem;
        }

        .welcome-title {
            font-size: 1.75rem;
            font-weight: 700;
            color: var(--color-primary);
            margin: 0;
        }

        .welcome-version {
            font-size: 0.85rem;
            color: var(--color-text-muted);
            margin: 0.5rem 0 0 0;
        }

        .welcome-actions {
            margin-bottom: 2rem;
        }

        .action-btn {
            display: flex;
            align-items: center;
            gap: 0.5rem;
            padding: 0.75rem 1.5rem;
            border-radius: 8px;
            font-size: 1rem;
            cursor: pointer;
            transition: all 0.2s;
            border: none;
        }

        .action-btn.primary {
            background: var(--color-primary);
            color: #0a1929;
        }

        .action-btn.primary:hover {
            opacity: 0.9;
        }

        .feature-grid {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 0.75rem;
            margin-bottom: 2rem;
            max-width: 600px;
        }

        .feature-btn {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 0.25rem;
            padding: 1rem 0.75rem;
            background: var(--color-panel);
            border: 1px solid var(--color-border);
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.2s;
        }

        .feature-btn:hover {
            border-color: var(--color-primary);
            background: var(--color-message-bg);
        }

        .feature-btn .material-symbols-outlined {
            font-size: 1.5rem;
            color: var(--color-primary);
        }

        .feature-btn span:last-child {
            font-size: 0.75rem;
            color: var(--color-text);
        }

        .quick-links {
            display: flex;
            gap: 1rem;
        }

        .link-btn {
            display: flex;
            align-items: center;
            gap: 0.25rem;
            padding: 0.5rem 1rem;
            background: transparent;
            border: 1px solid var(--color-border);
            border-radius: 6px;
            cursor: pointer;
            color: var(--color-text-muted);
            font-size: 0.85rem;
            transition: all 0.2s;
        }

        .link-btn:hover {
            border-color: var(--color-primary);
            color: var(--color-text);
        }

        .link-btn .material-symbols-outlined {
            font-size: 1rem;
        }

        @media (max-width: 640px) {
            .feature-grid {
                grid-template-columns: repeat(2, 1fr);
            }
            .quick-links {
                flex-wrap: wrap;
                justify-content: center;
            }
        }
    </style>
</body>

</html>
