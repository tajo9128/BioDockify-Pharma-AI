<html>

<head>
    <script type="module">
        import { store } from "/components/welcome/welcome-store.js";
    </script>
</head>

<body>
    <div x-data>
        <template x-if="$store.welcomeStore">
            <div class="welcome-container">
                <!-- Header with Logo -->
                <div class="welcome-header">
                    <svg class="welcome-logo" viewBox="0 0 960 960">
                        <defs>
                            <linearGradient id="g" x1="0%" y1="0%" x2="100%" y2="100%">
                                <stop offset="0%" style="stop-color:#00d4aa"/>
                                <stop offset="100%" style="stop-color:#00897b"/>
                            </linearGradient>
                        </defs>
                        <rect width="960" height="960" rx="160" fill="url(#g)"/>
                        <circle cx="480" cy="280" r="80" fill="#0a1929"/>
                        <circle cx="340" cy="480" r="80" fill="#0a1929"/>
                        <circle cx="620" cy="480" r="80" fill="#0a1929"/>
                        <circle cx="480" cy="680" r="80" fill="#0a1929"/>
                    </svg>
                    <h1 class="welcome-title">BioDockify AI</h1>
                    <p class="welcome-version">v1.33</p>
                </div>

                <!-- Buttons -->
                <div class="welcome-buttons">
                    <button class="btn-primary" @click="$store.welcomeStore.executeAction('new-chat')">
                        <span>New Chat</span>
                    </button>
                    <button class="btn-secondary" @click="$store.welcomeStore.executeAction('home')">
                        <span>Chat History</span>
                    </button>
                </div>

                <!-- Features -->
                <div class="welcome-features">
                    <div class="feature" @click="openModal('components/statistics/statistics-modal.html')">
                        <span class="material-symbols-outlined">analytics</span>
                        <span>Statistics</span>
                    </div>
                    <div class="feature" @click="openModal('components/literature/literature-modal.html')">
                        <span class="material-symbols-outlined">menu_book</span>
                        <span>Literature</span>
                    </div>
                    <div class="feature" @click="openModal('components/thesis/thesis-modal.html')">
                        <span class="material-symbols-outlined">description</span>
                        <span>Thesis</span>
                    </div>
                    <div class="feature" @click="openModal('components/wetlab/wetlab-modal.html')">
                        <span class="material-symbols-outlined">science</span>
                        <span>Wet Lab</span>
                    </div>
                </div>
            </div>
        </template>
    </div>

    <style>
        .welcome-container {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            padding: 2rem;
            background: var(--color-background);
        }

        .welcome-header {
            text-align: center;
            margin-bottom: 2rem;
        }

        .welcome-logo {
            width: 80px;
            height: 80px;
            margin-bottom: 1rem;
        }

        .welcome-title {
            font-size: 1.5rem;
            font-weight: 700;
            color: var(--color-primary);
            margin: 0;
        }

        .welcome-version {
            font-size: 0.85rem;
            color: var(--color-text-muted);
            margin: 0.5rem 0 0 0;
        }

        .welcome-buttons {
            display: flex;
            gap: 1rem;
            margin-bottom: 2rem;
        }

        .btn-primary, .btn-secondary {
            padding: 0.75rem 1.5rem;
            border-radius: 8px;
            font-size: 1rem;
            cursor: pointer;
            transition: all 0.2s;
        }

        .btn-primary {
            background: var(--color-primary);
            color: #0a1929;
            border: none;
        }

        .btn-primary:hover {
            opacity: 0.9;
        }

        .btn-secondary {
            background: transparent;
            color: var(--color-text);
            border: 1px solid var(--color-border);
        }

        .btn-secondary:hover {
            border-color: var(--color-primary);
        }

        .welcome-features {
            display: flex;
            gap: 0.75rem;
            flex-wrap: wrap;
            justify-content: center;
        }

        .feature {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 0.25rem;
            padding: 0.75rem 1rem;
            background: var(--color-panel);
            border: 1px solid var(--color-border);
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.2s;
        }

        .feature:hover {
            border-color: var(--color-primary);
        }

        .feature .material-symbols-outlined {
            font-size: 1.5rem;
            color: var(--color-primary);
        }

        .feature span:last-child {
            font-size: 0.75rem;
            color: var(--color-text);
        }

        @media (max-width: 480px) {
            .welcome-buttons {
                flex-direction: column;
            }
            .welcome-features {
                display: grid;
                grid-template-columns: repeat(2, 1fr);
            }
        }
    </style>
</body>

</html>
