<html>
<head>
  <script type="module">
    import { createStore } from "/js/AlpineStore.js";
    import { callJsonApi } from "/js/api.js";

    export const store = createStore("systemHealth", {
      checks: [],
      status: "checking",
      security: null,
      diagnosis: null,
      loading: false,
      error: "",

      async refresh() {
        this.loading = true; this.error = "";
        try {
          const r = await callJsonApi("system_health", { action: "status" });
          this.checks = r.checks || []; this.status = r.status || "unknown";
        } catch (e) { this.error = e.message; }
        this.loading = false;
      },

      async fullDiagnose() {
        this.loading = true; this.error = "";
        try {
          const r = await callJsonApi("system_health", { action: "diagnose" });
          this.checks = r.checks || []; this.status = r.status || "unknown";
          this.security = r.security || null; this.diagnosis = r.diagnosis || null;
        } catch (e) { this.error = e.message; }
        this.loading = false;
      },

      statusIcon(s) { return s==="ok" ? "🟢" : s==="warn" ? "🟡" : s==="fail" ? "🔴" : "⚪"; },
      statusColor(s) { return s==="ok" ? "#22c55e" : s==="warn" ? "#ffd93d" : s==="fail" ? "#ff6b6b" : "#888"; },
      overallIcon() { return this.status==="healthy" ? "🟢" : this.status==="degraded" ? "🟡" : "🔴"; },
    });
  </script>
</head>
<body>
  <div x-data class="sh-panel" x-init="$store.systemHealth?.refresh()">
    <div class="sh-header">
      <span class="material-symbols-outlined sh-icon">monitoring</span>
      <div>
        <h2>System Health</h2>
        <p class="sh-sub" x-text="$store.systemHealth?.overallIcon() + ' ' + ($store.systemHealth?.status || 'checking')"></p>
      </div>
      <div class="sh-actions">
        <button class="sh-btn" @click="$store.systemHealth?.refresh()" :disabled="$store.systemHealth?.loading">
          <span class="material-symbols-outlined">refresh</span>
        </button>
        <button class="sh-btn-primary" @click="$store.systemHealth?.fullDiagnose()" :disabled="$store.systemHealth?.loading">
          <span class="material-symbols-outlined">biotech</span> Full Diagnose
        </button>
      </div>
    </div>

    <div x-show="$store.systemHealth?.error" class="sh-error" x-text="$store.systemHealth?.error"></div>
    <div x-show="$store.systemHealth?.loading" class="sh-loading"><div class="loading-spinner"></div> Checking system...</div>

    <!-- Connectivity -->
    <div class="sh-card">
      <h4>Connectivity</h4>
      <div class="sh-grid">
        <template x-for="c in ($store.systemHealth?.checks || []).filter(c => ['Internet','ChromaDB','Backup','Research Mgmt','Statistics','Thesis'].includes(c.name))" :key="c.name">
          <div class="sh-item">
            <span class="sh-dot" :style="'background:' + $store.systemHealth?.statusColor(c.status)"></span>
            <div class="sh-item-info">
              <span class="sh-item-name" x-text="c.name"></span>
              <span class="sh-item-detail" x-text="c.detail"></span>
            </div>
            <span class="sh-item-status" :style="'color:' + $store.systemHealth?.statusColor(c.status)" x-text="c.status"></span>
          </div>
        </template>
      </div>
    </div>

    <!-- Fallback Status -->
    <div class="sh-card">
      <h4>Feature Fallback Status</h4>
      <div class="sh-grid">
        <template x-for="c in ($store.systemHealth?.checks || []).filter(c => ['TTS','Drug Properties','Literature Search'].includes(c.name))" :key="c.name">
          <div class="sh-item">
            <span class="sh-dot" :style="'background:' + $store.systemHealth?.statusColor(c.status)"></span>
            <div class="sh-item-info">
              <span class="sh-item-name" x-text="c.name"></span>
              <span class="sh-item-detail" x-text="c.detail"></span>
            </div>
            <span class="sh-item-status" :style="'color:' + $store.systemHealth?.statusColor(c.status)" x-text="c.status"></span>
          </div>
        </template>
      </div>
    </div>

    <!-- Resources -->
    <div class="sh-card">
      <h4>Resources</h4>
      <div class="sh-grid">
        <template x-for="c in ($store.systemHealth?.checks || []).filter(c => ['Disk','Memory','TTS','RDKit'].includes(c.name))" :key="c.name">
          <div class="sh-item">
            <span class="sh-dot" :style="'background:' + $store.systemHealth?.statusColor(c.status)"></span>
            <div class="sh-item-info">
              <span class="sh-item-name" x-text="c.name"></span>
              <span class="sh-item-detail" x-text="c.detail"></span>
            </div>
            <div x-show="c.percent !== undefined">
              <div class="sh-bar"><div class="sh-bar-fill" :style="'width:' + (c.percent||0) + '%' + (c.percent > 85 ? ';background:#ff6b6b' : '')"></div></div>
            </div>
          </div>
        </template>
      </div>
    </div>

    <!-- Security -->
    <div x-show="$store.systemHealth?.security" class="sh-card">
      <h4>Security</h4>
      <div class="sh-sec">
        <span x-text="'Secrets found: ' + ($store.systemHealth?.security?.secrets_found || 0)"></span>
        <span :style="'color:' + (($store.systemHealth?.security?.secrets_found || 0) > 0 ? '#ff6b6b' : '#22c55e')"
          x-text="($store.systemHealth?.security?.secrets_found || 0) > 0 ? '⚠ Review needed' : '✅ Clean'"></span>
      </div>
    </div>

    <style>
      .sh-panel { display: flex; flex-direction: column; height: 100%; overflow-y: auto; padding: 12px 14px; background: var(--color-background); }
      .sh-header { display: flex; align-items: center; gap: 8px; margin-bottom: 10px; }
      .sh-icon { font-size: 22px; color: var(--color-primary); }
      .sh-header h2 { font-size: 0.9rem; margin: 0; font-weight: 700; color: var(--color-primary); }
      .sh-sub { font-size: 0.58rem; color: var(--color-text-muted); margin: 0; text-transform: capitalize; }
      .sh-actions { display: flex; gap: 4px; margin-left: auto; }
      .sh-btn, .sh-btn-primary { display: flex; align-items: center; gap: 3px; padding: 5px 10px; border-radius: 6px; cursor: pointer; font-size: 0.62rem; font-weight: 600; }
      .sh-btn { background: var(--color-panel); border: 1px solid var(--color-border); color: var(--color-text); }
      .sh-btn-primary { background: var(--color-primary); border: none; color: white; }
      .sh-btn:disabled, .sh-btn-primary:disabled { opacity: 0.5; cursor: not-allowed; }
      .sh-error { padding: 4px 8px; background: rgba(255,107,107,0.1); border-radius: 4px; color: var(--color-error-text); font-size: 0.6rem; margin-bottom: 6px; }
      .sh-loading { display: flex; align-items: center; gap: 5px; font-size: 0.6rem; color: var(--color-text-muted); margin-bottom: 8px; }
      .loading-spinner { width: 12px; height: 12px; border: 2px solid var(--color-border); border-top: 2px solid var(--color-primary); border-radius: 50%; animation: spin 0.8s linear infinite; }
      @keyframes spin { to { transform: rotate(360deg); } }
      .sh-card { padding: 10px 12px; background: var(--color-panel); border: 1px solid var(--color-border); border-radius: 8px; margin-bottom: 8px; }
      .sh-card h4 { font-size: 0.62rem; font-weight: 600; color: var(--color-text-muted); text-transform: uppercase; letter-spacing: 0.3px; margin: 0 0 6px 0; }
      .sh-grid { display: flex; flex-direction: column; gap: 4px; }
      .sh-item { display: flex; align-items: center; gap: 8px; font-size: 0.62rem; }
      .sh-dot { width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0; }
      .sh-item-info { flex: 1; min-width: 0; }
      .sh-item-name { color: var(--color-text); font-weight: 500; display: block; }
      .sh-item-detail { color: var(--color-text-muted); font-size: 0.55rem; }
      .sh-item-status { font-size: 0.55rem; text-transform: capitalize; white-space: nowrap; }
      .sh-bar { flex: 1; height: 6px; background: var(--color-border); border-radius: 3px; overflow: hidden; max-width: 100px; }
      .sh-bar-fill { height: 100%; background: var(--color-primary); border-radius: 3px; transition: width 0.5s; }
      .sh-sec { display: flex; justify-content: space-between; font-size: 0.6rem; }
    </style>
  </div>
</body>
</html>
