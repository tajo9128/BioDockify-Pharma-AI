<html>
<head>
  <script type="module">
    import { store } from "/components/thesis/thesis-store.js";
  </script>
</head>
<body>
  <div x-data class="thesis-modal">
    <div class="modal-header">
      <h2>Thesis Tracker</h2>
    </div>

    <div class="modal-content">
      <div class="thesis-progress">
        <h3>Progress</h3>
        <div class="progress-bar">
          <template x-for="chapter in $store.thesisModal.chapters">
            <div class="chapter-item" @click="$store.thesisModal.selectChapter(chapter)">
              <span class="chapter-number" x-text="chapter.id"></span>
              <span class="chapter-title" x-text="chapter.title"></span>
            </div>
          </template>
        </div>
      </div>

      <div class="export-area">
        <button class="export-btn" @click="$store.thesisModal.exportLatex()">Export LaTeX</button>
      </div>
    </div>

    <style>
      .thesis-modal { padding: var(--spacing-md); max-width: 700px; }
      .modal-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: var(--spacing-md); }
      .modal-header h2 { color: var(--color-primary); }
      .thesis-progress h3 { color: var(--color-text); margin-bottom: var(--spacing-sm); }
      .progress-bar { display: flex; flex-direction: column; gap: var(--spacing-xs); }
      .chapter-item { display: flex; align-items: center; gap: var(--spacing-sm); padding: var(--spacing-sm); background: var(--color-panel); border: 1px solid var(--color-border); border-radius: 4px; cursor: pointer; }
      .chapter-number { width: 24px; height: 24px; display: flex; align-items: center; justify-content: center; background: var(--color-border); border-radius: 50%; font-size: 12px; color: var(--color-text); }
      .chapter-title { flex: 1; color: var(--color-text); }
      .export-area { margin-top: var(--spacing-md); }
      .export-btn { padding: var(--spacing-sm) var(--spacing-md); background: var(--color-primary); color: white; border: none; border-radius: 4px; cursor: pointer; }
    </style>
  </div>
</body>
</html>
