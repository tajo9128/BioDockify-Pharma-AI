<html>
<head>
  <script type="module">
    import { createStore } from "/js/AlpineStore.js";

    export const store = createStore("thesisModal", {
      chapters: [
        {id: 1, title: "Introduction", content: "", status: "pending"},
        {id: 2, title: "Literature Review", content: "", status: "pending"},
        {id: 3, title: "Methods", content: "", status: "pending"},
        {id: 4, title: "Results", content: "", status: "pending"},
        {id: 5, title: "Discussion", content: "", status: "pending"},
        {id: 6, title: "Conclusion", content: "", status: "pending"}
      ],
      activeChapter: null,
      
      selectChapter(chapter) {
        this.activeChapter = chapter;
      },
      
      markComplete(chapter) {
        chapter.status = chapter.status === "complete" ? "pending" : "complete";
      },
      
      exportLatex() {
        alert("LaTeX export requires backend integration");
      }
    });
  </script>
</head>
<body>
  <div x-data="store" class="thesis-modal">
    <div class="modal-header">
      <h2>Thesis Tracker</h2>
      <button class="close-btn" @click="closeModal()">×</button>
    </div>

    <div class="modal-content">
      <div class="thesis-progress">
        <h3>Progress</h3>
        <div class="progress-bar">
          <template x-for="chapter in chapters">
            <div class="chapter-item" :class="{complete: chapter.status === 'complete'}" @click="selectChapter(chapter)">
              <span class="chapter-number" x-text="chapter.id"></span>
              <span class="chapter-title" x-text="chapter.title"></span>
              <button class="check-btn" @click.stop="markComplete(chapter)">
                <span x-text="chapter.status === 'complete' ? '✓' : '○'"></span>
              </button>
            </div>
          </template>
        </div>
      </div>

      <div class="export-area">
        <button class="export-btn" @click="exportLatex()">Export LaTeX</button>
      </div>
    </div>

    <style>
      .thesis-modal { padding: var(--spacing-md); max-width: 700px; }
      .modal-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: var(--spacing-md); }
      .modal-header h2 { color: var(--color-primary); }
      .close-btn { background: none; border: none; font-size: 24px; cursor: pointer; color: var(--color-text-muted); }
      .thesis-progress h3 { color: var(--color-text); margin-bottom: var(--spacing-sm); }
      .progress-bar { display: flex; flex-direction: column; gap: var(--spacing-xs); }
      .chapter-item { display: flex; align-items: center; gap: var(--spacing-sm); padding: var(--spacing-sm); background: var(--color-panel); border: 1px solid var(--color-border); border-radius: 4px; cursor: pointer; }
      .chapter-item.complete { border-color: var(--color-primary); background: var(--color-secondary); }
      .chapter-number { width: 24px; height: 24px; display: flex; align-items: center; justify-content: center; background: var(--color-border); border-radius: 50%; font-size: 12px; color: var(--color-text); }
      .chapter-item.complete .chapter-number { background: var(--color-primary); color: white; }
      .chapter-title { flex: 1; color: var(--color-text); }
      .check-btn { background: none; border: none; cursor: pointer; color: var(--color-primary); }
      .export-area { margin-top: var(--spacing-md); }
      .export-btn { padding: var(--spacing-sm) var(--spacing-md); background: var(--color-primary); color: white; border: none; border-radius: 4px; cursor: pointer; }
    </style>
  </div>
</body>
</html>
