<html>
<head>
  <script type="module">
    import { createStore } from "/js/AlpineStore.js";
    import { callJsonApi } from "/js/api.js";

    export const store = createStore("academicWriter", {
      // Tab state
      activeTab: "literature",

      // Shared
      topic: "",
      loading: false,
      result: null,
      error: "",

      // TTS
      playing: false,
      synth: null,
      utterance: null,

      // Literature Writing
      litScope: "comprehensive",
      litYearStart: "2020",
      litYearEnd: "2026",
      litSections: ["introduction", "current-state", "key-findings", "gaps", "future"],

      // Research / Review
      resType: "review",
      resFormat: "apa",
      resWordCount: "5000",

      // Thesis
      thesisChapterId: "introduction",
      thesisBranch: "general",
      thesisDegree: "phd",

      // Lecture
      lectureDuration: "60",
      lectureLevel: "undergraduate",

      // Slides
      slideStyle: "academic",
      slideCount: 10,
      slideCitations: true,
      slideSources: [],

      get tabs() {
        return [
          { id: "literature", label: "Literature Review", icon: "menu_book" },
          { id: "research", label: "Research Paper", icon: "description" },
          { id: "thesis", label: "PhD / PG Thesis", icon: "school" },
          { id: "lecture", label: "Lecture Builder", icon: "cast" },
          { id: "slides", label: "Slides", icon: "slideshow" },
        ];
      },
      get branches() {
        return [
          { id: "general", label: "General Pharma" },
          { id: "clinical", label: "Clinical Pharmacy" },
          { id: "pharmacology", label: "Pharmacology" },
          { id: "medicinal", label: "Medicinal Chemistry" },
          { id: "pharmacy", label: "Pharmacy Practice" },
        ];
      },
      get chapters() {
        return [
          { id: "introduction", label: "Introduction & Background" },
          { id: "literature_review", label: "Literature Review" },
          { id: "methodology", label: "Research Methodology" },
          { id: "results", label: "Results & Analysis" },
          { id: "discussion", label: "Discussion" },
          { id: "conclusion", label: "Conclusion & Future Work" },
        ];
      },

      switchTab(tab) {
        this.activeTab = tab;
        this.result = null;
        this.error = "";
        this.stopSpeech();
      },

      async generate() {
        if (!this.topic.trim()) { this.error = "Please enter a topic"; return; }
        this.loading = true;
        this.error = "";
        this.result = null;

        try {
          switch (this.activeTab) {
            case "thesis": await this._genThesis(); break;
            case "lecture": await this._genLecture(); break;
            case "slides": await this._genSlides(); break;
            case "literature": case "research": this._genViaAgent(); break;
          }
        } catch (e) { this.error = e.message; }
        this.loading = false;
      },

      async _genThesis() {
        try {
          const resp = await callJsonApi("thesis/generate-chapter", {
            chapter_id: this.thesisChapterId,
            topic: this.topic,
            branch: this.thesisBranch,
            degree: this.thesisDegree,
            agent_mode: true,
          });
          if (resp.error && !resp.chapter) { this.error = resp.error; return; }
          this.result = {
            type: "thesis",
            title: resp.chapter?.title || this.topic,
            content: resp.chapter?.content || resp.content || resp.text || JSON.stringify(resp, null, 2),
            sections: resp.chapter?.sections || [],
            citations: resp.citations || [],
          };
        } catch { this._genViaAgent(); }
      },

      async _genLecture() {
        try {
          const resp = await callJsonApi("lecture_generate", {
            topic: this.topic,
            duration: this.lectureDuration,
            level: this.lectureLevel,
          });
          if (resp.error && !resp.lecture) { this.error = resp.error; return; }
          this.result = { type: "lecture", ...resp };
        } catch { this._genViaAgent(); }
      },

      async _genSlides() {
        try {
          const payload = {
            topic: this.topic,
            style: this.slideStyle,
            num_slides: this.slideCount,
            include_citations: this.slideCitations,
          };
          if (this.slideSources.length) {
            payload.slide_contents = this.slideSources.map(s => ({
              title: s.title || s,
              content: s.abstract || s.content || "",
              type: "research",
              notes: s.authors ? `Authors: ${s.authors}` : "",
            }));
          }
          const endpoint = this.slideSources.length ? "slides/assemble-slides" : "slides/generate-from-kb";
          const resp = await callJsonApi(endpoint, payload);
          if (resp.error && !resp.slides && !resp.presentation) { this.error = resp.error; return; }
          this.result = { type: "slides", topic: this.topic, slides: resp.slides || resp.presentation?.slides || [], ...resp };
        } catch { this._genViaAgent(); }
      },

      _genViaAgent() {
        const prompts = {
          literature: `Write a comprehensive ${this.litScope} literature review on "${this.topic}". Cover publications from ${this.litYearStart}-${this.litYearEnd}. Include sections: ${this.litSections.join(', ')}. Format with headings, subheadings, and cite key references with author names and years.`,
          research: `Write a ${this.resType} article on "${this.topic}". Target ~${this.resWordCount} words. Include: 1) Abstract, 2) Introduction & Background, 3) Current State of Knowledge, 4) Critical Analysis, 5) Future Perspectives, 6) References. Use ${this.resFormat} citation format. Make it ready for journal submission.`,
          thesis: `Write the "${this.thesisChapterId}" chapter for a ${this.thesisDegree} thesis in ${this.thesisBranch} on "${this.topic}". Include proper academic structure, subheadings, and citations.`,
          lecture: `Create a ${this.lectureDuration}-minute lecture for ${this.lectureLevel} students on "${this.topic}". Include: 1) Learning Objectives, 2) Lecture Sections with timestamps, 3) Key Concepts, 4) Summary, 5) 3 Homework Questions, 6) Lab/Practical if applicable.`,
          slides: `Create a ${this.slideCount}-slide presentation on "${this.topic}" in ${this.slideStyle} style. For each slide provide: slide number, title, bullet points, and speaker notes.${this.slideSources.length ? `\n\nSource materials to include:\n${this.slideSources.map(s => `- ${s.title || s}`).join('\n')}` : ''}`,
        };
        const p = prompts[this.activeTab] || prompts.literature;
        const input = document.querySelector("#chat-bar-input textarea, .chat-bar-input textarea, .input-area textarea");
        if (input) {
          input.value = p;
          input.dispatchEvent(new Event("input", { bubbles: true }));
          input.focus();
          this.result = {
            type: this.activeTab,
            title: this.topic,
            content: `Agent task sent to chat. The agent will compose your ${this.tabs.find(t => t.id === this.activeTab)?.label || 'document'} on "${this.topic}".`,
          };
        } else { this.error = "Chat input not found. Type your request in chat."; }
      },

      toggleSpeech() {
        if (this.playing) { this.stopSpeech(); return; }
        const text = this.result?.content || "";
        if (!text) return;

        // Try Kokoro/Edge-TTS backend first
        this._ttsViaBackend(text);
      },

      async _ttsViaBackend(text) {
        try {
          const resp = await callJsonApi("kokoro_tts", { text: text.substring(0, 3000), voice: "en-us", speed: 1.0 });
          if (resp.audio) {
            this.playing = true;
            const binary = atob(resp.audio);
            const bytes = new Uint8Array(binary.length);
            for (let i = 0; i < binary.length; i++) bytes[i] = binary.charCodeAt(i);
            const blob = new Blob([bytes], { type: resp.format === "mp3" ? "audio/mpeg" : "audio/wav" });
            const url = URL.createObjectURL(blob);
            const audio = new Audio(url);
            audio.onended = () => { this.playing = false; URL.revokeObjectURL(url); };
            audio.onerror = () => { this.playing = false; this._ttsBrowser(text); };
            audio.play();
            return;
          }
        } catch {}
        // Fallback to browser TTS
        this._ttsBrowser(text);
      },

      _ttsBrowser(text) {
        if (!('speechSynthesis' in window)) return;
        this.synth = window.speechSynthesis;
        this.utterance = new SpeechSynthesisUtterance(text.substring(0, 5000));
        this.utterance.rate = 0.9;
        this.utterance.pitch = 1;
        this.utterance.onend = () => { this.playing = false; };
        this.utterance.onerror = () => { this.playing = false; };
        this.synth.speak(this.utterance);
        this.playing = true;
      },
      stopSpeech() {
        if (this.synth) { this.synth.cancel(); this.playing = false; }
      },
      downloadText() {
        if (!this.result?.content) return;
        const blob = new Blob([this.result.content], { type: "text/plain" });
        const url = URL.createObjectURL(blob);
        const a = document.createElement("a");
        a.href = url;
        a.download = `${this.topic.replace(/\s+/g,'_').substring(0,50)}.txt`;
        a.click();
        URL.revokeObjectURL(url);
      },
      clear() {
        this.topic = "";
        this.result = null;
        this.error = "";
        this.stopSpeech();
      },
      refineWithAgent() {
        const text = this.result?.content?.substring(0, 1000) || "";
        const p = `Please refine and improve this text. Add more key references, fix any inaccuracies, and polish the academic language:\n\n${text}...`;
        const input = document.querySelector("#chat-bar-input textarea, .chat-bar-input textarea, .input-area textarea");
        if (input) { input.value = p; input.dispatchEvent(new Event("input", { bubbles: true })); input.focus(); }
      },
    });
  </script>
</head>
<body>
  <div x-data class="academic-writer">
    <!-- Header -->
    <div class="aw-header">
      <span class="material-symbols-outlined aw-icon">description</span>
      <div>
        <h2>Academic Writer</h2>
        <p class="aw-subtitle">Literature reviews · Research papers · Thesis · Lectures · Slides</p>
      </div>
    </div>

    <!-- Tabs -->
    <div class="aw-tabs">
      <template x-for="tab in $store.academicWriter.tabs" :key="tab.id">
        <button class="aw-tab" :class="{ active: $store.academicWriter.activeTab === tab.id }" @click="$store.academicWriter.switchTab(tab.id)">
          <span class="material-symbols-outlined" x-text="tab.icon"></span>
          <span x-text="tab.label"></span>
        </button>
      </template>
    </div>

    <!-- Topic input (shared) -->
    <div class="aw-input-row">
      <input type="text" x-model="$store.academicWriter.topic"
        :placeholder="$store.academicWriter.activeTab === 'literature' ? 'Literature review topic (e.g. mRNA vaccine delivery systems)...' : $store.academicWriter.activeTab === 'research' ? 'Research/review article topic...' : $store.academicWriter.activeTab === 'thesis' ? 'Thesis topic...' : $store.academicWriter.activeTab === 'lecture' ? 'Lecture topic...' : 'Presentation topic...'"
        class="aw-topic-input" @keyup.enter="$store.academicWriter.generate()" />
      <button class="aw-gen-btn" @click="$store.academicWriter.generate()" :disabled="$store.academicWriter.loading || !$store.academicWriter.topic">
        <span class="material-symbols-outlined">auto_awesome</span>
        <span x-text="$store.academicWriter.loading ? 'Working...' : 'Generate'"></span>
      </button>
    </div>

    <!-- Tab-specific options -->
    <!-- Literature options -->
    <div x-show="$store.academicWriter.activeTab === 'literature'" class="aw-options">
      <div class="opt-group">
        <label class="opt-label">Scope</label>
        <select x-model="$store.academicWriter.litScope" class="opt-select">
          <option value="comprehensive">Comprehensive</option>
          <option value="systematic">Systematic</option>
          <option value="narrative">Narrative</option>
          <option value="scoping">Scoping</option>
        </select>
      </div>
      <div class="opt-group">
        <label class="opt-label">Year Range</label>
        <div class="opt-row">
          <input type="number" x-model="$store.academicWriter.litYearStart" class="opt-input-sm" />
          <span class="opt-sep">—</span>
          <input type="number" x-model="$store.academicWriter.litYearEnd" class="opt-input-sm" />
        </div>
      </div>
      <div class="opt-group">
        <label class="opt-label">Sections</label>
        <div class="opt-chips">
          <label class="chip-check" :class="{on: $store.academicWriter.litSections.includes('introduction')}"><input type="checkbox" value="introduction" x-model="$store.academicWriter.litSections" style="display:none"><span>Intro</span></label>
          <label class="chip-check" :class="{on: $store.academicWriter.litSections.includes('current-state')}"><input type="checkbox" value="current-state" x-model="$store.academicWriter.litSections" style="display:none"><span>Current State</span></label>
          <label class="chip-check" :class="{on: $store.academicWriter.litSections.includes('key-findings')}"><input type="checkbox" value="key-findings" x-model="$store.academicWriter.litSections" style="display:none"><span>Key Findings</span></label>
          <label class="chip-check" :class="{on: $store.academicWriter.litSections.includes('gaps')}"><input type="checkbox" value="gaps" x-model="$store.academicWriter.litSections" style="display:none"><span>Gaps</span></label>
          <label class="chip-check" :class="{on: $store.academicWriter.litSections.includes('future')}"><input type="checkbox" value="future" x-model="$store.academicWriter.litSections" style="display:none"><span>Future</span></label>
        </div>
      </div>
    </div>

    <!-- Research options -->
    <div x-show="$store.academicWriter.activeTab === 'research'" class="aw-options">
      <div class="opt-group">
        <label class="opt-label">Type</label>
        <select x-model="$store.academicWriter.resType" class="opt-select">
          <option value="review">Review Article</option>
          <option value="research">Research Paper</option>
          <option value="perspective">Perspective</option>
          <option value="case-study">Case Study</option>
          <option value="meta-analysis">Meta-Analysis</option>
        </select>
      </div>
      <div class="opt-group">
        <label class="opt-label">Citation Format</label>
        <select x-model="$store.academicWriter.resFormat" class="opt-select">
          <option value="apa">APA 7th</option>
          <option value="vancouver">Vancouver</option>
          <option value="harvard">Harvard</option>
        </select>
      </div>
      <div class="opt-group">
        <label class="opt-label">Target Length</label>
        <select x-model="$store.academicWriter.resWordCount" class="opt-select">
          <option value="3000">~3000 words</option>
          <option value="5000">~5000 words</option>
          <option value="8000">~8000 words</option>
          <option value="12000">~12000 words</option>
        </select>
      </div>
    </div>

    <!-- Thesis options -->
    <div x-show="$store.academicWriter.activeTab === 'thesis'" class="aw-options">
      <div class="opt-group">
        <label class="opt-label">Chapter</label>
        <select x-model="$store.academicWriter.thesisChapterId" class="opt-select">
          <template x-for="ch in $store.academicWriter.chapters" :key="ch.id">
            <option :value="ch.id" x-text="ch.label"></option>
          </template>
        </select>
      </div>
      <div class="opt-group">
        <label class="opt-label">Branch</label>
        <select x-model="$store.academicWriter.thesisBranch" class="opt-select">
          <template x-for="b in $store.academicWriter.branches" :key="b.id">
            <option :value="b.id" x-text="b.label"></option>
          </template>
        </select>
      </div>
      <div class="opt-group">
        <label class="opt-label">Degree</label>
        <select x-model="$store.academicWriter.thesisDegree" class="opt-select">
          <option value="phd">PhD</option>
          <option value="pharm_d">Pharm.D</option>
          <option value="msc">MSc</option>
          <option value="bsc">BSc</option>
        </select>
      </div>
    </div>

    <!-- Lecture options -->
    <div x-show="$store.academicWriter.activeTab === 'lecture'" class="aw-options">
      <div class="opt-group">
        <label class="opt-label">Duration</label>
        <select x-model="$store.academicWriter.lectureDuration" class="opt-select">
          <option value="30">30 min</option>
          <option value="60">60 min</option>
          <option value="90">90 min</option>
          <option value="120">120 min</option>
        </select>
      </div>
      <div class="opt-group">
        <label class="opt-label">Level</label>
        <select x-model="$store.academicWriter.lectureLevel" class="opt-select">
          <option value="undergraduate">Undergraduate</option>
          <option value="graduate">Graduate</option>
          <option value="pharmd">Pharm.D</option>
          <option value="phd">PhD / PG</option>
        </select>
      </div>
    </div>

    <!-- Slides options -->
    <div x-show="$store.academicWriter.activeTab === 'slides'" class="aw-options">
      <div class="opt-group">
        <label class="opt-label">Style</label>
        <select x-model="$store.academicWriter.slideStyle" class="opt-select">
          <option value="academic">Academic</option>
          <option value="clinical">Clinical</option>
          <option value="corporate">Corporate</option>
          <option value="minimal">Minimal</option>
        </select>
      </div>
      <div class="opt-group">
        <label class="opt-label">Slides</label>
        <input type="number" x-model="$store.academicWriter.slideCount" min="3" max="30" class="opt-input-sm" />
      </div>
      <div class="opt-group check-group">
        <label class="opt-check-label">
          <input type="checkbox" x-model="$store.academicWriter.slideCitations" />
          <span>Include citations</span>
        </label>
      </div>
    </div>

    <!-- Status -->
    <div x-show="$store.academicWriter.error" class="aw-error" x-text="$store.academicWriter.error"></div>
    <div x-show="$store.academicWriter.loading" class="aw-loading">
      <div class="loading-spinner"></div>
      <span x-text="'Generating ' + ($store.academicWriter.tabs.find(t=>t.id===$store.academicWriter.activeTab)?.label || 'content') + '...'"></span>
    </div>

    <!-- Results -->
    <template x-if="$store.academicWriter.result">
      <div class="aw-results">
        <div class="aw-results-toolbar">
          <h3 x-text="$store.academicWriter.result.title || $store.academicWriter.topic" class="aw-result-title"></h3>
          <div class="aw-result-actions">
            <button class="aw-act-btn" :class="{playing: $store.academicWriter.playing}" @click="$store.academicWriter.toggleSpeech()">
              <span class="material-symbols-outlined" x-text="$store.academicWriter.playing ? 'stop' : 'volume_up'"></span>
              Read
            </button>
            <button class="aw-act-btn" @click="$store.academicWriter.downloadText()">
              <span class="material-symbols-outlined">download</span>
              TXT
            </button>
            <button class="aw-act-btn" @click="$store.academicWriter.refineWithAgent()">
              <span class="material-symbols-outlined">psychology</span>
              Refine
            </button>
            <button class="aw-act-btn" @click="$store.academicWriter.clear()">
              <span class="material-symbols-outlined">refresh</span>
              New
            </button>
          </div>
        </div>

        <!-- Lecture-specific: learning objectives, sections, homework -->
        <template x-if="$store.academicWriter.result.type === 'lecture'">
          <div>
            <div x-show="$store.academicWriter.result.lecture?.learning_objectives?.length" class="aw-section">
              <h4>Learning Objectives</h4>
              <ul><template x-for="obj in $store.academicWriter.result.lecture.learning_objectives"><li x-text="obj"></li></template></ul>
            </div>
            <div x-show="$store.academicWriter.result.lecture?.sections" class="aw-sections">
              <template x-for="sec in $store.academicWriter.result.lecture.sections">
                <div class="aw-section"><h4 x-text="sec.title"></h4><p x-text="sec.content || ''"></p></div>
              </template>
            </div>
            <div x-show="$store.academicWriter.result.lecture?.summary" class="aw-section summary">
              <h4>Summary</h4><p x-text="$store.academicWriter.result.lecture.summary"></p>
            </div>
            <div x-show="$store.academicWriter.result.homework?.length" class="aw-section">
              <h4>Homework</h4>
              <ul><template x-for="hw in $store.academicWriter.result.homework"><li x-text="hw"></li></template></ul>
            </div>
          </div>
        </template>

        <!-- Slides-specific -->
        <template x-if="$store.academicWriter.result.type === 'slides' && $store.academicWriter.result.slides?.length">
          <div class="aw-slides">
            <template x-for="(slide, i) in $store.academicWriter.result.slides">
              <div class="aw-slide-card">
                <span class="aw-slide-num" x-text="'#' + (i + 1)"></span>
                <div class="aw-slide-body">
                  <div class="aw-slide-title" x-text="slide.title || slide.heading || ''"></div>
                  <div class="aw-slide-text" x-text="slide.content || slide.body || ''"></div>
                </div>
              </div>
            </template>
          </div>
        </template>

        <!-- Citations -->
        <div x-show="$store.academicWriter.result.citations?.length" class="aw-citations">
          <h4>References (<span x-text="$store.academicWriter.result.citations.length"></span>)</h4>
          <template x-for="cite in $store.academicWriter.result.citations">
            <div class="aw-cite" x-text="typeof cite === 'string' ? cite : (cite.title || cite.text || '')"></div>
          </template>
        </div>

        <!-- Default: raw content -->
        <div x-show="!$store.academicWriter.result.type || $store.academicWriter.result.type === 'literature' || $store.academicWriter.result.type === 'research' || $store.academicWriter.result.type === 'thesis'" class="aw-content-area">
          <div class="aw-content-text" x-text="$store.academicWriter.result.content"></div>
        </div>
      </div>
    </template>

    <!-- Empty state -->
    <div x-show="!$store.academicWriter.result && !$store.academicWriter.loading" class="aw-empty">
      <span class="material-symbols-outlined aw-empty-icon">auto_awesome</span>
      <p>Enter a topic and generate</p>
      <div class="aw-quick-chips">
        <button class="aw-chip" @click="$store.academicWriter.topic='AI-driven drug discovery: current approaches and future directions'; $store.academicWriter.activeTab='literature'; $store.academicWriter.generate()">Lit: AI drug discovery</button>
        <button class="aw-chip" @click="$store.academicWriter.topic='Pharmacokinetics of novel tyrosine kinase inhibitors'; $store.academicWriter.activeTab='research'; $store.academicWriter.generate()">Paper: PK of TKIs</button>
        <button class="aw-chip" @click="$store.academicWriter.topic='Computational approaches in pharmaceutical R&D'; $store.academicWriter.activeTab='thesis'; $store.academicWriter.thesisChapterId='introduction'; $store.academicWriter.generate()">Thesis: Computational pharma</button>
        <button class="aw-chip" @click="$store.academicWriter.topic='Drug-receptor interactions and signal transduction pathways'; $store.academicWriter.activeTab='lecture'; $store.academicWriter.generate()">Lecture: Drug receptors</button>
        <button class="aw-chip" @click="$store.academicWriter.topic='Advances in CRISPR-based gene therapy'; $store.academicWriter.activeTab='slides'; $store.academicWriter.slideStyle='academic'; $store.academicWriter.generate()">Slides: CRISPR</button>
      </div>
    </div>

    <style>
      .academic-writer { display: flex; flex-direction: column; height: 100%; overflow-y: auto; padding: 14px 18px; background: var(--color-background); }
      .aw-header { display: flex; align-items: center; gap: 10px; margin-bottom: 10px; flex-shrink: 0; }
      .aw-icon { font-size: 26px; color: var(--color-primary); }
      .aw-header h2 { color: var(--color-primary); font-size: 1rem; margin: 0; font-weight: 700; }
      .aw-subtitle { color: var(--color-text-muted); font-size: 0.65rem; margin: 0; }
      .aw-tabs { display: flex; gap: 2px; margin-bottom: 12px; border-bottom: 1px solid var(--color-border); padding-bottom: 0; overflow-x: auto; scrollbar-width: none; }
      .aw-tabs::-webkit-scrollbar { display: none; }
      .aw-tab { display: flex; align-items: center; gap: 4px; padding: 6px 10px; background: transparent; border: none; border-bottom: 2px solid transparent; color: var(--color-text-muted); cursor: pointer; font-size: 0.68rem; font-weight: 500; white-space: nowrap; transition: all 0.15s; }
