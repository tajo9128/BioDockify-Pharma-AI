<html>
<head>
  <script type="module">
    import { createStore } from "/js/AlpineStore.js";
    import { callJsonApi } from "/js/api.js";

    export const store = createStore("thesisModal", {
      mode: "lit-review",
      topic: "",
      branch: "general",
      degree: "phd",
      chapterId: "introduction",
      loading: false,
      generated: null,
      error: "",
      playing: false,
      synth: null,
      utterance: null,

      get modes() {
        return [
          { id: "lit-review", label: "Literature Review", icon: "menu_book", desc: "Summarize and synthesize research papers into a structured review" },
          { id: "paper", label: "Research Paper", icon: "description", desc: "Write a full research paper with abstract, methods, results" },
          { id: "chapter", label: "Thesis Chapter", icon: "book", desc: "Generate a specific thesis chapter (intro, methods, etc.)" },
        ];
      },

      get branches() {
        return [
          { id: "general", label: "General Pharma" },
          { id: "clinical", label: "Clinical Pharmacy" },
          { id: "pharmacology", label: "Pharmacology" },
          { id: "medicinal", label: "Medicinal Chemistry" },
          { id: "pharmacy", label: "Pharmacy Practice" },
        ];
      },

      get chapters() {
        return [
          { id: "introduction", label: "Introduction" },
          { id: "literature_review", label: "Literature Review" },
          { id: "methodology", label: "Methodology" },
          { id: "results", label: "Results" },
          { id: "discussion", label: "Discussion" },
          { id: "conclusion", label: "Conclusion" },
        ];
      },

      async generate() {
        if (!this.topic.trim()) return;
        this.loading = true;
        this.error = "";
        this.generated = null;

        try {
          if (this.mode === "chapter") {
            await this._generateChapter();
          } else {
            await this._generateViaAgent();
          }
        } catch (e) {
          this.error = e.message;
        }
        this.loading = false;
      },

      async _generateChapter() {
        try {
          const resp = await callJsonApi("thesis/generate-chapter", {
            chapter_id: this.chapterId,
            topic: this.topic,
            branch: this.branch,
            degree: this.degree,
            agent_mode: true,
          });
          if (resp.error) { this.error = resp.error; return; }
          this.generated = {
            title: resp.chapter?.title || this.topic,
            content: resp.chapter?.content || resp.content || resp.text || JSON.stringify(resp, null, 2),
            sections: resp.chapter?.sections || [],
            citations: resp.citations || [],
          };
        } catch {
          this._generateViaAgent();
        }
      },

      async _generateViaAgent() {
        let prompt = "";
        if (this.mode === "lit-review") {
          prompt = `Write a comprehensive literature review on "${this.topic}" for ${this.branch} at ${this.degree} level. Include: 1) Introduction, 2) Current State of Knowledge, 3) Key Findings, 4) Gaps in Literature, 5) Future Directions. Format with headings and cite key papers.`;
        } else {
          prompt = `Write a ${this.mode === 'paper' ? 'research paper' : 'academic document'} on "${this.topic}" for ${this.branch} at ${this.degree} level. Include structured sections, key concepts, and relevant citations.`;
        }

        const input = document.querySelector("#chat-bar-input textarea, .chat-bar-input textarea, .input-area textarea");
        if (input) {
          input.value = prompt;
          input.dispatchEvent(new Event("input", { bubbles: true }));
          input.focus();
          this.generated = {
            title: this.topic,
            content: `Agent task sent to chat. The agent will compose your ${this.modes.find(m => m.id === this.mode)?.label || 'document'} on "${this.topic}".`,
            sections: [],
            citations: [],
          };
        } else {
          this.error = "Chat input not found. Type your request in chat.";
        }
      },

      async loadChapters() {
        try {
          const resp = await callJsonApi("thesis/chapters");
        } catch {}
      },

      // TTS Read-Aloud
      toggleSpeech() {
        if (this.playing) {
          this.stopSpeech();
          return;
        }
        const text = this.generated?.content || "";
        if (!text) return;

        if ('speechSynthesis' in window) {
          this.synth = window.speechSynthesis;
          this.utterance = new SpeechSynthesisUtterance(text.substring(0, 5000));
          this.utterance.rate = 0.9;
          this.utterance.pitch = 1;
          this.utterance.onend = () => { this.playing = false; };
          this.utterance.onerror = () => { this.playing = false; };
          this.synth.speak(this.utterance);
          this.playing = true;
        }
      },

      stopSpeech() {
        if (this.synth) {
          this.synth.cancel();
          this.playing = false;
        }
      },

      downloadText() {
        if (!this.generated?.content) return;
        const blob = new Blob([this.generated.content], { type: "text/plain" });
        const url = URL.createObjectURL(blob);
        const a = document.createElement("a");
        a.href = url;
        a.download = `${this.topic.replace(/\s+/g, '_')}.txt`;
        a.click();
        URL.revokeObjectURL(url);
      },

      clear() {
        this.topic = "";
        this.generated = null;
        this.error = "";
        this.stopSpeech();
      },
    });
  </script>
</head>
<body>
  <div x-data class="thesis-panel" x-init="$store.thesisModal.loadChapters()">
    <div class="panel-header">
      <span class="material-symbols-outlined panel-icon">description</span>
      <h2>Academic Writer</h2>
    </div>

    <div class="panel-content">
      <!-- Mode selector -->
      <div class="mode-grid">
        <template x-for="m in $store.thesisModal.modes" :key="m.id">
          <button class="mode-card" :class="{'selected': $store.thesisModal.mode === m.id}" @click="$store.thesisModal.mode = m.id; $store.thesisModal.generated = null">
            <span class="material-symbols-outlined mode-icon" x-text="m.icon"></span>
            <span class="mode-label" x-text="m.label"></span>
            <span class="mode-desc" x-text="m.desc"></span>
          </button>
        </template>
      </div>

      <!-- Input form -->
      <div class="input-section">
        <div class="input-row">
          <input
            type="text"
            x-model="$store.thesisModal.topic"
            placeholder="Enter your research topic..."
            class="topic-input"
            @keyup.enter="$store.thesisModal.generate()"
          />
          <button class="btn-generate" @click="$store.thesisModal.generate()" :disabled="$store.thesisModal.loading || !$store.thesisModal.topic">
            <span class="material-symbols-outlined">auto_awesome</span>
            <span x-text="$store.thesisModal.loading ? 'Generating...' : 'Generate'"></span>
          </button>
        </div>

        <!-- Thesis chapter mode options -->
        <div x-show="$store.thesisModal.mode === 'chapter'" class="chapter-options">
          <div class="option-row">
            <div class="option-group">
              <label class="opt-label">Chapter</label>
              <select x-model="$store.thesisModal.chapterId" class="opt-select">
                <template x-for="ch in $store.thesisModal.chapters" :key="ch.id">
                  <option :value="ch.id" x-text="ch.label"></option>
                </template>
              </select>
            </div>
            <div class="option-group">
              <label class="opt-label">Branch</label>
              <select x-model="$store.thesisModal.branch" class="opt-select">
                <template x-for="b in $store.thesisModal.branches" :key="b.id">
                  <option :value="b.id" x-text="b.label"></option>
                </template>
              </select>
            </div>
            <div class="option-group">
              <label class="opt-label">Degree</label>
              <select x-model="$store.thesisModal.degree" class="opt-select">
                <option value="phd">PhD</option>
                <option value="pharm_d">Pharm.D</option>
                <option value="msc">MSc</option>
                <option value="bsc">BSc</option>
              </select>
            </div>
          </div>
        </div>
      </div>

      <!-- Error -->
      <div x-show="$store.thesisModal.error" class="error-banner" x-text="$store.thesisModal.error"></div>

      <!-- Loading -->
      <div x-show="$store.thesisModal.loading" class="loading-bar">
        <div class="loading-spinner"></div>
        <span>Generating content...</span>
      </div>

      <!-- Results -->
      <template x-if="$store.thesisModal.generated">
        <div class="results-section">
          <div class="results-toolbar">
            <h3 class="result-title" x-text="$store.thesisModal.generated.title"></h3>
            <div class="toolbar-actions">
              <button class="tts-btn" :class="{'playing': $store.thesisModal.playing}" @click="$store.thesisModal.toggleSpeech()">
                <span class="material-symbols-outlined" x-text="$store.thesisModal.playing ? 'stop' : 'volume_up'"></span>
                <span x-text="$store.thesisModal.playing ? 'Stop' : 'Read Aloud'"></span>
              </button>
              <button class="tool-btn" @click="$store.thesisModal.downloadText()">
                <span class="material-symbols-outlined">download</span>
                <span>Download TXT</span>
              </button>
              <button class="tool-btn" @click="$store.thesisModal.clear()">
                <span class="material-symbols-outlined">refresh</span>
                <span>New</span>
              </button>
            </div>
          </div>

          <!-- Citations -->
          <div x-show="$store.thesisModal.generated.citations && $store.thesisModal.generated.citations.length" class="citations-box">
            <h4>References</h4>
            <ul>
              <template x-for="cite in $store.thesisModal.generated.citations" :key="cite">
                <li x-text="typeof cite === 'string' ? cite : (cite.title || cite.text || '')"></li>
              </template>
            </ul>
          </div>

          <!-- Content -->
          <div class="content-area">
            <div class="content-text" x-text="$store.thesisModal.generated.content"></div>
          </div>

          <div class="agent-help">
            <button class="agent-help-btn" @click="const p = 'Please summarize and improve this academic text. Add more key references and polish the language: ' + $store.thesisModal.generated.content.substring(0, 1000); const input = document.querySelector('#chat-bar-input textarea, .chat-bar-input textarea'); if(input) { input.value = p; input.dispatchEvent(new Event('input', {bubbles:true})); input.focus(); }">
              <span class="material-symbols-outlined">psychology</span>
              <span>Ask agent to refine and add references</span>
            </button>
          </div>
        </div>
      </template>

      <!-- Empty state -->
      <div x-show="!$store.thesisModal.generated && !$store.thesisModal.loading" class="empty-state">
        <span class="material-symbols-outlined empty-icon">auto_awesome</span>
        <p>Select a writing mode, enter your topic, and generate</p>
        <div class="quick-chips">
          <button class="chip" @click="$store.thesisModal.mode='lit-review'; $store.thesisModal.topic='AI applications in drug discovery'; $store.thesisModal.generate()">AI in drug discovery</button>
          <button class="chip" @click="$store.thesisModal.mode='lit-review'; $store.thesisModal.topic='mRNA vaccine development platforms'; $store.thesisModal.generate()">mRNA vaccines</button>
          <button class="chip" @click="$store.thesisModal.mode='paper'; $store.thesisModal.topic='Pharmacokinetics of novel NSAIDs'; $store.thesisModal.generate()">PK of NSAIDs</button>
          <button class="chip" @click="$store.thesisModal.mode='chapter'; $store.thesisModal.chapterId='introduction'; $store.thesisModal.topic='Computational approaches in pharmaceutical R&D'; $store.thesisModal.generate()">Computational pharma</button>
        </div>
      </div>
    </div>

    <style>
      .thesis-panel { display: flex; flex-direction: column; height: 100%; overflow-y: auto; padding: 16px 20px; background: var(--color-background); }
      .panel-header { display: flex; align-items: center; gap: 10px; margin-bottom: 16px; flex-shrink: 0; }
      .panel-icon { font-size: 28px; color: var(--color-primary); }
      .panel-header h2 { color: var(--color-primary); font-size: 1.05rem; margin: 0; font-weight: 700; }
      .panel-content { flex: 1; display: flex; flex-direction: column; }

      /* Mode grid */
      .mode-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 8px; margin-bottom: 16px; }
      .mode-card { display: flex; flex-direction: column; align-items: center; padding: 12px 8px; background: var(--color-panel); border: 2px solid var(--color-border); border-radius: 10px; cursor: pointer; transition: all 0.15s; text-align: center; gap: 4px; }
      .mode-card:hover { border-color: var(--color-primary); }
      .mode-card.selected { border-color: var(--color-primary); background: color-mix(in srgb, var(--color-primary) 8%, var(--color-panel)); }
      .mode-icon { font-size: 24px; color: var(--color-primary); }
      .mode-label { font-size: 0.72rem; font-weight: 700; color: var(--color-text); }
      .mode-desc { font-size: 0.6rem; color: var(--color-text-muted); line-height: 1.2; }
      @media (max-width: 500px) { .mode-grid { grid-template-columns: 1fr; } }

      /* Input */
      .input-section { margin-bottom: 12px; }
      .input-row { display: flex; gap: 8px; }
      .topic-input { flex: 1; padding: 10px 14px; border: 1px solid var(--color-border); border-radius: 8px; background: var(--color-panel); color: var(--color-text); font-size: 0.82rem; }
      .topic-input:focus { outline: none; border-color: var(--color-primary); }
      .btn-generate { display: flex; align-items: center; gap: 6px; padding: 10px 18px; background: var(--color-primary); color: white; border: none; border-radius: 8px; cursor: pointer; font-size: 0.78rem; font-weight: 600; white-space: nowrap; }
      .btn-generate:hover:not(:disabled) { opacity: 0.9; }
      .btn-generate:disabled { opacity: 0.5; cursor: not-allowed; }
      .chapter-options { margin-top: 8px; }
      .option-row { display: flex; gap: 8px; flex-wrap: wrap; }
      .option-group { flex: 1; min-width: 120px; }
      .opt-label { display: block; font-size: 0.65rem; font-weight: 600; color: var(--color-text-muted); margin-bottom: 3px; }
      .opt-select { width: 100%; padding: 6px 8px; border: 1px solid var(--color-border); border-radius: 6px; background: var(--color-panel); color: var(--color-text); font-size: 0.7rem; }

      .error-banner { padding: 8px 12px; background: rgba(255,107,107,0.1); border: 1px solid rgba(255,107,107,0.3); border-radius: 6px; color: var(--color-error-text, #ff6b6b); font-size: 0.72rem; margin-bottom: 12px; }
      .loading-bar { display: flex; align-items: center; gap: 8px; padding: 8px 0; font-size: 0.72rem; color: var(--color-text-muted); }
      .loading-spinner { width: 16px; height: 16px; border: 2px solid var(--color-border); border-top: 2px solid var(--color-primary); border-radius: 50%; animation: spin 0.8s linear infinite; }
      @keyframes spin { to { transform: rotate(360deg); } }

      /* Results */
      .results-section { flex: 1; display: flex; flex-direction: column; }
      .results-toolbar { display: flex; align-items: center; justify-content: space-between; gap: 8px; padding-bottom: 10px; border-bottom: 1px solid var(--color-border); margin-bottom: 10px; flex-wrap: wrap; }
      .result-title { font-size: 0.85rem; font-weight: 700; color: var(--color-text); margin: 0; flex: 1; min-width: 0; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
      .toolbar-actions { display: flex; gap: 4px; flex-shrink: 0; }
      .tts-btn, .tool-btn { display: flex; align-items: center; gap: 3px; padding: 5px 10px; background: var(--color-panel); border: 1px solid var(--color-border); border-radius: 6px; color: var(--color-text); cursor: pointer; font-size: 0.68rem; white-space: nowrap; transition: all 0.12s; }
      .tts-btn:hover, .tool-btn:hover { border-color: var(--color-primary); }
      .tts-btn.playing { background: var(--color-primary); color: white; border-color: var(--color-primary); }
      .tts-btn .material-symbols-outlined, .tool-btn .material-symbols-outlined { font-size: 16px; }
      .citations-box { padding: 10px 14px; background: color-mix(in srgb, var(--color-primary) 4%, var(--color-panel)); border: 1px solid color-mix(in srgb, var(--color-primary) 15%, var(--color-border)); border-radius: 8px; margin-bottom: 10px; font-size: 0.7rem; }
      .citations-box h4 { margin: 0 0 6px 0; font-size: 0.7rem; color: var(--color-primary); }
      .citations-box ul { margin: 0; padding-left: 16px; }
      .citations-box li { color: var(--color-text-muted); margin-bottom: 2px; line-height: 1.4; }
      .content-area { flex: 1; padding: 14px; background: var(--color-panel); border: 1px solid var(--color-border); border-radius: 10px; overflow-y: auto; min-height: 200px; }
      .content-text { white-space: pre-wrap; font-size: 0.78rem; line-height: 1.7; color: var(--color-text); }
      .agent-help { margin-top: 12px; }
      .agent-help-btn { display: flex; align-items: center; gap: 6px; padding: 8px 12px; background: color-mix(in srgb, var(--color-accent, #4fc3f7) 8%, var(--color-panel)); border: 1px solid color-mix(in srgb, var(--color-accent, #4fc3f7) 25%, var(--color-border)); border-radius: 8px; color: var(--color-text); cursor: pointer; font-size: 0.7rem; width: 100%; justify-content: center; }
      .agent-help-btn:hover { background: color-mix(in srgb, var(--color-accent, #4fc3f7) 15%, var(--color-panel)); }

      /* Empty */
      .empty-state { display: flex; flex-direction: column; align-items: center; padding: 40px 20px; text-align: center; }
      .empty-icon { font-size: 42px; color: var(--color-border); margin-bottom: 10px; }
      .empty-state p { color: var(--color-text-muted); font-size: 0.78rem; margin: 0 0 12px 0; }
      .quick-chips { display: flex; flex-wrap: wrap; gap: 6px; justify-content: center; }
      .chip { padding: 6px 12px; background: var(--color-panel); border: 1px solid var(--color-border); border-radius: 8px; font-size: 0.7rem; color: var(--color-text); cursor: pointer; }
      .chip:hover { border-color: var(--color-primary); background: color-mix(in srgb, var(--color-primary) 6%, var(--color-panel)); }
    </style>
  </div>
</body>
</html>
