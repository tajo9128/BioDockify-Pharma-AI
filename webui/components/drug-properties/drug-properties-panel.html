<html>
<head>
  <script type="module">
    import { createStore } from "/js/AlpineStore.js";
    import { callJsonApi } from "/js/api.js";

    export const store = createStore("drugProperties", {
      smiles: "",
      preset: "",
      loading: false,
      result: null,
      error: "",
      library: {},
      _restored: false,

      persist() {
        try { localStorage.setItem("biodockify.drug_props", JSON.stringify({ smiles: this.smiles, preset: this.preset })); } catch {}
      },
      restore() {
        if (this._restored) return; this._restored = true;
        try {
          const s = JSON.parse(localStorage.getItem("biodockify.drug_props") || "{}");
          if (s.smiles) this.smiles = s.smiles;
          if (s.preset) this.preset = s.preset;
        } catch {}
      },

      async init() {
        try {
          const resp = await callJsonApi("drug_properties", {});
          if (resp.library) this.library = resp.library;
        } catch {}
      },

      async calculate() {
        if (!this.smiles.trim() && !this.preset) return;
        this.loading = true;
        this.error = "";
        this.result = null;
        try {
          const payload = { smiles: this.smiles.trim() };
          if (this.preset) payload.preset = this.preset;
          const resp = await callJsonApi("drug_properties", payload);
          if (resp.error) { this.error = resp.error; return; }
          if (resp.hint && !resp.properties) { this.error = resp.hint; return; }
          this.result = resp;
        } catch (e) { this.error = e.message; }
        this.loading = false;
        this.persist();
      },

      clear() {
        this.smiles = "";
        this.preset = "";
        this.result = null;
        this.error = "";
        this.persist();
      },

      get hasResult() { return this.result && this.result.properties; },
      get lipinskiPassed() { return this.result?.lipinski?.passed; },
    });
  </script>
</head>
<body>
  <div x-data class="drug-panel" x-init="$store.drugProperties.restore()">
    <div class="panel-header">
      <span class="material-symbols-outlined panel-icon">medication</span>
      <h2>Drug Properties</h2>
    </div>

    <div class="panel-content">
      <!-- Input -->
      <div class="search-row">
        <input
          type="text"
          x-model="$store.drugProperties.smiles"
          placeholder="Enter SMILES (e.g. CC(=O)Oc1ccccc1C(=O)O for Aspirin)"
          class="smiles-input"
          @keyup.enter="$store.drugProperties.calculate()"
        />
        <button class="btn-primary" @click="$store.drugProperties.calculate()" :disabled="$store.drugProperties.loading || !$store.drugProperties.smiles">
          <span class="material-symbols-outlined">calculate</span>
          <span x-text="$store.drugProperties.loading ? 'Calculating...' : 'Calculate'"></span>
        </button>
        <button class="btn-secondary" @click="$store.drugProperties.clear()" x-show="$store.drugProperties.smiles || $store.drugProperties.result">
          <span class="material-symbols-outlined">clear</span>
        </button>
      </div>

      <!-- Error -->
      <div x-show="$store.drugProperties.error" class="error-banner" x-text="$store.drugProperties.error"></div>

      <!-- Results -->
      <template x-if="$store.drugProperties.hasResult">
        <div class="results-section">
          <!-- Molecule header -->
          <div class="molecule-card">
            <div class="molecule-header">
              <span class="material-symbols-outlined molecule-icon">science</span>
              <div>
                <span class="molecule-smiles" x-text="$store.drugProperties.result.smiles"></span>
                <div class="molecule-badge" :class="$store.drugProperties.lipinskiPassed ? 'pass' : 'fail'"
                     x-text="$store.drugProperties.lipinskiPassed ? '✅ Lipinski Pass' : '❌ Lipinski Fail'"></div>
              </div>
            </div>
            <div class="molecule-composition">
              <span>Atoms: </span>
              <template x-for="(count, atom) in $store.drugProperties.result.atoms" :key="atom">
                <span class="atom-chip" x-text="atom + ': ' + count"></span>
              </template>
            </div>
          </div>

          <!-- Property table -->
          <div class="property-table">
            <h3 class="table-title">Calculated Properties</h3>
            <div class="prop-row" :class="{'rule-violation': !$store.drugProperties.result.lipinski?.rules['MW < 500']}">
              <span class="prop-label">Molecular Weight</span>
              <span class="prop-value" x-text="$store.drugProperties.result.properties.molecular_weight.value + ' ' + $store.drugProperties.result.properties.molecular_weight.unit"></span>
              <span class="prop-status" x-text="$store.drugProperties.result.lipinski?.rules['MW < 500'] ? '✓' : '✗ >500'"></span>
            </div>
            <div class="prop-row" :class="{'rule-violation': !$store.drugProperties.result.lipinski?.rules['LogP < 5']}">
              <span class="prop-label">LogP (lipophilicity)</span>
              <span class="prop-value" x-text="$store.drugProperties.result.properties.logp.value"></span>
              <span class="prop-status" x-text="$store.drugProperties.result.lipinski?.rules['LogP < 5'] ? '✓' : '✗ >5'"></span>
            </div>
            <div class="prop-row" :class="{'rule-violation': !$store.drugProperties.result.lipinski?.rules['HBD < 5']}">
              <span class="prop-label">H-Bond Donors</span>
              <span class="prop-value" x-text="$store.drugProperties.result.properties.h_bond_donors.value"></span>
              <span class="prop-status" x-text="$store.drugProperties.result.lipinski?.rules['HBD < 5'] ? '✓' : '✗ >5'"></span>
            </div>
            <div class="prop-row" :class="{'rule-violation': !$store.drugProperties.result.lipinski?.rules['HBA < 10']}">
              <span class="prop-label">H-Bond Acceptors</span>
              <span class="prop-value" x-text="$store.drugProperties.result.properties.h_bond_acceptors.value"></span>
              <span class="prop-status" x-text="$store.drugProperties.result.lipinski?.rules['HBA < 10'] ? '✓' : '✗ >10'"></span>
            </div>
            <div class="prop-row">
              <span class="prop-label">TPSA</span>
              <span class="prop-value" x-text="$store.drugProperties.result.properties.tpsa.value + ' ' + $store.drugProperties.result.properties.tpsa.unit"></span>
              <span class="prop-status"></span>
            </div>
          </div>

          <!-- Lipinski summary -->
          <div class="lipinski-summary" :class="$store.drugProperties.lipinskiPassed ? 'pass' : 'fail'">
            <span class="material-symbols-outlined" x-text="$store.drugProperties.lipinskiPassed ? 'check_circle' : 'warning'"></span>
            <span x-text="$store.drugProperties.lipinskiPassed
              ? 'Lipinski Rule of Five: PASSED (≤1 violation, drug-likeness good)'
              : 'Lipinski Rule of Five: FAILED (' + $store.drugProperties.result.lipinski.violations + ' violations)'"></span>
          </div>
        </div>
      </template>

      <!-- Empty state -->
      <div x-show="!$store.drugProperties.result && !$store.drugProperties.error" class="empty-state">
        <span class="material-symbols-outlined empty-icon">biotech</span>
        <p>Enter a SMILES string to calculate drug properties</p>
        <div class="quick-chips">
          <template x-for="(name, key) in $store.drugProperties.library" :key="key">
            <button class="chip" @click="$store.drugProperties.preset = key; $store.drugProperties.calculate()" x-text="name"></button>
          </template>
        </div>
        <p class="empty-hint">Or ask the agent: "Calculate drug properties for ibuprofen"</p>
      </div>

      <!-- Loading -->
      <div x-show="$store.drugProperties.loading" class="loading-bar">
        <div class="loading-spinner"></div>
        <span>Computing molecular properties...</span>
      </div>
    </div>

    <style>
      .drug-panel { display: flex; flex-direction: column; height: 100%; overflow-y: auto; padding: 16px 20px; background: var(--color-background); }
      .panel-header { display: flex; align-items: center; gap: 10px; margin-bottom: 16px; flex-shrink: 0; }
      .panel-icon { font-size: 28px; color: var(--color-primary); }
      .panel-header h2 { color: var(--color-primary); font-size: 1.05rem; margin: 0; font-weight: 700; }
      .panel-content { flex: 1; }
      .search-row { display: flex; gap: 8px; margin-bottom: 12px; }
      .smiles-input { flex: 1; padding: 9px 12px; border: 1px solid var(--color-border); border-radius: 8px; background: var(--color-panel); color: var(--color-text); font-size: 0.8rem; font-family: var(--font-mono, 'SF Mono', Monaco, Consolas, monospace); }
      .smiles-input:focus { outline: none; border-color: var(--color-primary); }
      .smiles-input::placeholder { color: var(--color-text-muted); font-family: var(--font-family-main); }
      .btn-primary, .btn-secondary { display: flex; align-items: center; gap: 6px; padding: 8px 14px; border-radius: 8px; cursor: pointer; font-size: 0.78rem; font-weight: 600; transition: all 0.15s; white-space: nowrap; }
      .btn-primary { background: var(--color-primary); color: white; border: none; }
      .btn-primary:hover:not(:disabled) { opacity: 0.9; }
      .btn-primary:disabled { opacity: 0.5; cursor: not-allowed; }
      .btn-secondary { background: var(--color-panel); border: 1px solid var(--color-border); color: var(--color-text); }
      .btn-secondary:hover { border-color: var(--color-primary); }
      .error-banner { padding: 8px 12px; background: rgba(255,107,107,0.1); border: 1px solid rgba(255,107,107,0.3); border-radius: 6px; color: var(--color-error-text, #ff6b6b); font-size: 0.75rem; margin-bottom: 12px; }

      /* Molecule card */
      .molecule-card { padding: 14px; background: var(--color-panel); border: 1px solid var(--color-border); border-radius: 10px; margin-bottom: 14px; }
      .molecule-header { display: flex; align-items: center; gap: 10px; margin-bottom: 10px; }
      .molecule-icon { font-size: 28px; color: var(--color-primary); }
      .molecule-smiles { font-size: 0.72rem; font-family: var(--font-mono, monospace); color: var(--color-text); word-break: break-all; }
      .molecule-badge { display: inline-block; margin-top: 4px; padding: 2px 10px; border-radius: 10px; font-size: 0.65rem; font-weight: 600; }
      .molecule-badge.pass { background: rgba(34,197,94,0.12); color: #22c55e; }
      .molecule-badge.fail { background: rgba(255,107,107,0.12); color: var(--color-error-text, #ff6b6b); }
      .molecule-composition { display: flex; flex-wrap: wrap; gap: 4px; align-items: center; font-size: 0.7rem; color: var(--color-text-muted); }
      .atom-chip { padding: 2px 8px; background: var(--color-background); border: 1px solid var(--color-border); border-radius: 4px; font-family: var(--font-mono, monospace); font-size: 0.65rem; }

      /* Property table */
      .property-table { background: var(--color-panel); border: 1px solid var(--color-border); border-radius: 10px; overflow: hidden; margin-bottom: 14px; }
      .table-title { font-size: 0.75rem; font-weight: 700; color: var(--color-text); margin: 0; padding: 10px 14px; border-bottom: 1px solid var(--color-border); }
      .prop-row { display: flex; align-items: center; padding: 8px 14px; border-bottom: 1px solid var(--color-border); font-size: 0.72rem; transition: background 0.15s; }
      .prop-row:last-child { border-bottom: none; }
      .prop-row:hover { background: color-mix(in srgb, var(--color-primary) 3%, transparent); }
      .prop-label { flex: 1; color: var(--color-text-muted); font-weight: 500; }
      .prop-value { flex: 0 0 140px; color: var(--color-text); font-weight: 600; font-family: var(--font-mono, monospace); text-align: right; }
      .prop-status { flex: 0 0 60px; text-align: right; font-size: 0.68rem; }
      .prop-row.rule-violation { background: rgba(255,107,107,0.04); }
      .rule-violation .prop-status { color: var(--color-error-text, #ff6b6b); font-weight: 600; }

      /* Lipinski summary */
      .lipinski-summary { display: flex; align-items: center; gap: 8px; padding: 10px 14px; border-radius: 8px; font-size: 0.72rem; }
      .lipinski-summary.pass { background: rgba(34,197,94,0.08); color: #22c55e; }
      .lipinski-summary.fail { background: rgba(255,107,107,0.08); color: var(--color-error-text, #ff6b6b); }
      .lipinski-summary .material-symbols-outlined { font-size: 20px; flex-shrink: 0; }

      /* Empty */
      .empty-state { display: flex; flex-direction: column; align-items: center; padding: 48px 20px; text-align: center; }
      .empty-icon { font-size: 48px; color: var(--color-border); margin-bottom: 12px; }
      .empty-state p { color: var(--color-text-muted); font-size: 0.78rem; margin: 0 0 12px 0; }
      .quick-chips { display: flex; flex-wrap: wrap; gap: 6px; justify-content: center; margin-bottom: 14px; }
      .chip { padding: 6px 12px; background: var(--color-panel); border: 1px solid var(--color-border); border-radius: 8px; font-size: 0.7rem; color: var(--color-text); cursor: pointer; transition: all 0.15s; }
      .chip:hover { border-color: var(--color-primary); background: color-mix(in srgb, var(--color-primary) 6%, var(--color-panel)); }
      .empty-hint { font-size: 0.68rem; color: var(--color-text-muted); font-style: italic; }

      /* Loading */
      .loading-bar { display: flex; align-items: center; gap: 8px; padding: 8px 0; font-size: 0.72rem; color: var(--color-text-muted); }
      .loading-spinner { width: 16px; height: 16px; border: 2px solid var(--color-border); border-top: 2px solid var(--color-primary); border-radius: 50%; animation: spin 0.8s linear infinite; }
      @keyframes spin { to { transform: rotate(360deg); } }
    </style>
  </div>
</body>
</html>
