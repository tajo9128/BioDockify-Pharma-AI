<html>
<head>
  <script type="module">
    import { store as sidebarStore } from "/components/sidebar/sidebar-store.js";
    import { store as chatsStore } from "/components/sidebar/chats/chats-store.js";
    import { store as projectsStore } from "/components/projects/projects-store.js";
    import { store as chatInputStore } from "/components/chat/input/input-store.js";
  </script>
</head>
<body>
  <div
    class="sidebar-header-stack"
    x-data
    @click.window="$store.sidebar.menuClick($event, $refs.headerPanel)"
    @keydown.escape.window="$store.sidebar.menuClose()"
  >
    <div
      id="sidebar-header-panel"
      class="sidebar-header-panel"
      x-ref="headerPanel"
      :class="{ 'sidebar-header-panel-open': $store.sidebar.headOpen() }"
    >
      <div id="logo-bar">
        <a href="https://github.com/tajo9128/BioDockify-Pharma-AI" target="_blank" rel="noopener noreferrer" aria-label="BioDockify Pharma AI on GitHub">
          <div class="logo-container">
            <span id="bio-logo" class="logo-expanded" role="img" aria-label="BioDockify Pharma AI"></span>
            <span id="bio-logo-collapsed" class="logo-collapsed" role="img" aria-label="BioDockify Pharma AI"></span>
          </div>
        </a>
      </div>

      <div class="icons-section" id="hide-button">
        <button id="toggle-sidebar" class="toggle-sidebar-button" @click="$store.sidebar.toggle()" aria-label="Toggle Sidebar" aria-expanded="false">
          <span class="material-symbols-outlined" aria-hidden="true">menu</span>
        </button>

        <button class="config-button header-action-button" id="header-dashboard" @click="$store.welcomeStore.executeAction('home')" title="Home" aria-label="Home" tabindex="-1">
          <span class="material-symbols-outlined" aria-hidden="true">home</span>
        </button>

        <button class="config-button header-action-button" id="header-plugins" @click="openModal('components/plugins/list/plugin-list.html')" title="Plugins" aria-label="Plugins" tabindex="-1">
          <span class="material-symbols-outlined" aria-hidden="true">extension</span>
        </button>

        <button class="config-button header-action-button" id="header-settings" @click="openModal('settings/settings.html')" title="Settings" aria-label="Settings" tabindex="-1">
          <span class="material-symbols-outlined" aria-hidden="true">settings</span>
        </button>

        <button
          class="config-button header-action-button dropdown-toggle"
          id="header-more"
          x-ref="menuButton"
          @click="$store.sidebar.menuToggle($refs.menuButton)"
          title="More options"
          aria-label="More options"
          tabindex="-1"
        >
          <span class="material-symbols-outlined" aria-hidden="true" :class="$store.sidebar.menuOpen ? 'rotated' : ''">expand_more</span>
        </button>
      </div>

      <div
        class="dropdown-menu quick-actions-dropdown"
        x-show="$store.sidebar.menuOpen"
        :style="$store.sidebar.dropdownStyle"
        @click.stop
      >
        <div id="sidebar-quick-actions-dropdown-slot-start"></div>

        <div class="dropdown-header">Navigation</div>

        <button class="dropdown-item" @click="$store.welcomeStore.executeAction('home'); $store.sidebar.menuClose()">
          <span class="material-symbols-outlined">home</span>
          <span>Dashboard</span>
        </button>

        <button class="dropdown-item" @click="$store.projects.openProjectsModal(); $store.sidebar.menuClose()">
          <span class="material-symbols-outlined">snippet_folder</span>
          <span>Projects</span>
        </button>

        <button id="sidebar-files-dropdown" class="dropdown-item" @click="$store.chatInput.browseFiles(); $store.sidebar.menuClose()">
          <span class="material-symbols-outlined">folder</span>
          <span>Files</span>
        </button>

        <button class="dropdown-item" @click="ensureModalOpen('settings/tunnel/remote-link.html'); $store.sidebar.menuClose()">
          <span class="material-symbols-outlined">share</span>
          <span>Remote Link</span>
        </button>

        <button class="dropdown-item" @click="openModal('components/modals/scheduler/scheduler-modal.html'); $store.sidebar.menuClose()">
          <span class="material-symbols-outlined">schedule</span>
          <span>Tasks</span>
        </button>

        <button class="dropdown-item" @click="openModal('settings/settings.html'); $store.sidebar.menuClose()">
          <span class="material-symbols-outlined">settings</span>
          <span>Settings</span>
        </button>

        <div class="dropdown-separator"></div>

        <button
          type="button"
          class="dropdown-item quick-actions-accordion-toggle"
          :class="{ 'is-open': $store.sidebar.isSectionOpen('chatActions') }"
          :aria-expanded="$store.sidebar.isSectionOpen('chatActions').toString()"
          @click="$store.sidebar.toggleSection('chatActions')"
        >
          <span class="quick-actions-accordion-label">
            <span class="material-symbols-outlined">forum</span>
            <span>Chat Actions</span>
          </span>
          <span class="material-symbols-outlined quick-actions-accordion-chevron">expand_more</span>
        </button>

        <div class="quick-actions-accordion-panel" x-show="$store.sidebar.isSectionOpen('chatActions')" style="display: none;">
          <button class="dropdown-item" @click="$store.chats.newChat(); $store.sidebar.menuClose()">
            <span class="material-symbols-outlined">chat_add_on</span>
            <span>New Chat</span>
          </button>

          <button class="dropdown-item" @click="$store.chats.loadChats(); $store.sidebar.menuClose()">
            <span class="material-symbols-outlined">folder_open</span>
            <span>Load Chat</span>
          </button>

          <button class="dropdown-item" x-show="$store.chats.selected" @click="$store.chats.saveChat(); $store.sidebar.menuClose()">
            <span class="material-symbols-outlined">save</span>
            <span>Save Chat</span>
          </button>

          <button class="dropdown-item" x-show="$store.chats.selected" @click="$confirmClick($event, () => { $store.chats.resetChat(); $store.sidebar.menuClose() })">
            <span class="material-symbols-outlined">delete_sweep</span>
            <span>Clear Chat</span>
          </button>
</div>

        <div class="dropdown-separator"></div>

        <div class="dropdown-header">BioDockify Research</div>

        <button class="dropdown-item" @click="openModal('components/research/research-tools.html'); $store.sidebar.menuClose()">
          <span class="material-symbols-outlined">science</span>
          <span>Research Tools</span>
        </button>

        <button class="dropdown-item" @click="openModal('components/statistics/statistics-modal.html'); $store.sidebar.menuClose()">
          <span class="material-symbols-outlined">analytics</span>
          <span>Statistics</span>
        </button>

        <button class="dropdown-item" @click="openModal('components/literature/literature-modal.html'); $store.sidebar.menuClose()">
          <span class="material-symbols-outlined">menu_book</span>
          <span>Literature</span>
        </button>

        <button class="dropdown-item" @click="openModal('components/thesis/thesis-modal.html'); $store.sidebar.menuClose()">
          <span class="material-symbols-outlined">description</span>
          <span>Thesis</span>
        </button>

        <button class="dropdown-item" @click="openModal('components/slides/slides-modal.html'); $store.sidebar.menuClose()">
          <span class="material-symbols-outlined">slideshow</span>
          <span>Slides</span>
        </button>

        <button class="dropdown-item" @click="openModal('components/wetlab/wetlab-modal.html'); $store.sidebar.menuClose()">
          <span class="material-symbols-outlined">biotech</span>
          <span>Wet Lab</span>
        </button>

        <button class="dropdown-item" @click="openModal('components/knowledge/knowledge-modal.html'); $store.sidebar.menuClose()">
          <span class="material-symbols-outlined">psychology</span>
          <span>Knowledge</span>
        </button>

        <div class="dropdown-separator"></div>

        <button class="dropdown-item" @click="$confirmClick($event, () => { $store.chats.restart(); $store.sidebar.menuClose() })">
          <span class="material-symbols-outlined">restart_alt</span>
          <span>Restart BioDockify</span>
        </button>

        <button class="dropdown-item" @click="$confirmClick($event, () => { $store.chats.restart(); $store.sidebar.menuClose() })">
          <span class="material-symbols-outlined">restart_alt</span>
          <span>Restart BioDockify</span>
        </button>

        <div id="sidebar-quick-actions-dropdown-slot-end"></div>
      </div>
    </div>
  </div>

  <style>
    :root {
      --header-panel-expanded-width: calc(250px - (var(--spacing-md) * 2));
      --header-panel-collapsed-width: 3.45rem;
    }

    .sidebar-header-panel {
      position: fixed;
      top: var(--spacing-md);
      left: var(--spacing-md);
      width: var(--header-panel-collapsed-width);
      box-sizing: border-box;
      z-index: 1004;
      display: flex;
      flex-direction: column;
      align-items: flex-start;
      padding: var(--spacing-xs) var(--spacing-sm);
      background-color: var(--color-chat-background);
      border: none;
      border-radius: 8px;
      box-shadow: 0 2px 13px 2px rgba(0, 0, 0, 0.35);
      overflow: hidden;
      white-space: nowrap;
      transition: width 0.3s cubic-bezier(0.4, 0, 0.2, 1), 
                  background-color var(--transition-speed),
                  border-color var(--transition-speed), 
                  box-shadow var(--transition-speed);
    }

    #logo-bar {
      display: flex;
      align-items: center;
      justify-content: flex-start;
      width: calc(var(--header-panel-expanded-width) - (var(--spacing-sm) * 2));
      padding-top: var(--spacing-xxs);
      padding-left: 0.1rem;
    }

    #logo-bar a {
      color: inherit;
      text-decoration: none;
      width: min(100%, 11.75rem);
    }

    .logo-container {
      position: relative;
      width: 100%;
      height: 1.64rem;
    }

    #bio-logo, #bio-logo-collapsed {
      display: block;
      width: 100%;
      height: 100%;
      background-size: contain;
      background-repeat: no-repeat;
      background-position: left center;
    }

    #bio-logo {
      background-image: url(/public/bio-full.svg);
    }

    #bio-logo-collapsed {
      background-image: url(/public/bio-collapsed.svg);
      width: 1.75rem;
      height: 1.75rem;
    }
  </style>
</body>
</html>
