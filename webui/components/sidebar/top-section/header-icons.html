<html>
<head>
  <script type="module">
    import { store as sidebarStore } from "/components/sidebar/sidebar-store.js";
    import { store as chatsStore } from "/components/sidebar/chats/chats-store.js";
    import { store as projectsStore } from "/components/projects/projects-store.js";
    import { store as chatInputStore } from "/components/chat/input/input-store.js";
  </script>
</head>
<body>
  <div
    class="sidebar-header-stack"
    x-data
    @click.window="$store.sidebar.menuClick($event, $refs.headerPanel)"
    @keydown.escape.window="$store.sidebar.menuClose()"
  >
    <div
      id="sidebar-header-panel"
      class="sidebar-header-panel"
      x-ref="headerPanel"
      :class="{ 'sidebar-header-panel-open': $store.sidebar.headOpen() }"
    >
      <div id="logo-bar">
        <a href="https://github.com/tajo9128/BioDockify-Pharma-AI" target="_blank" rel="noopener noreferrer" aria-label="BioDockify Pharma AI on GitHub">
          <div class="logo-container">
            <span id="bio-logo" class="logo-expanded" role="img" aria-label="BioDockify Pharma AI"></span>
            <span id="bio-logo-collapsed" class="logo-collapsed" role="img" aria-label="BioDockify Pharma AI"></span>
          </div>
        </a>
      </div>

      <!-- Primary Action: New Chat -->
      <div class="primary-actions">
        <button class="config-button header-action-button" @click="$store.chats.newChat()" title="New Chat" aria-label="New Chat">
          <span class="material-symbols-outlined">add_comment</span>
          <span class="icon-label">New Chat</span>
        </button>
      </div>

      <!-- Research Section Header -->
      <div class="section-header">
        <span class="section-title">Research</span>
      </div>

      <!-- Research Icons - All accessible, stacked below chat -->
      <div class="research-icons">
        <button class="config-button header-action-button" @click="openModal('components/research/research-tools.html')" title="Research Tools">
          <span class="material-symbols-outlined">science</span>
          <span class="icon-label">Research</span>
        </button>

        <button class="config-button header-action-button" @click="openModal('components/statistics/statistics-modal.html')" title="Statistics">
          <span class="material-symbols-outlined">analytics</span>
          <span class="icon-label">Statistics</span>
        </button>

        <button class="config-button header-action-button" @click="openModal('components/literature/literature-modal.html')" title="Literature">
          <span class="material-symbols-outlined">menu_book</span>
          <span class="icon-label">Literature</span>
        </button>

        <button class="config-button header-action-button" @click="openModal('components/thesis/thesis-modal.html')" title="Thesis">
          <span class="material-symbols-outlined">description</span>
          <span class="icon-label">Thesis</span>
        </button>

        <button class="config-button header-action-button" @click="openModal('components/slides/slides-modal.html')" title="Slides">
          <span class="material-symbols-outlined">slideshow</span>
          <span class="icon-label">Slides</span>
        </button>

        <button class="config-button header-action-button" @click="openModal('components/wetlab/wetlab-modal.html')" title="Wet Lab">
          <span class="material-symbols-outlined">biotech</span>
          <span class="icon-label">Wet Lab</span>
        </button>

        <button class="config-button header-action-button" @click="openModal('components/knowledge/knowledge-modal.html')" title="Knowledge">
          <span class="material-symbols-outlined">psychology</span>
          <span class="icon-label">Knowledge</span>
        </button>
      </div>

      <!-- Settings row at bottom -->
      <div class="settings-row">
        <button id="toggle-sidebar" class="toggle-sidebar-button" @click="$store.sidebar.toggle()" aria-label="Toggle Sidebar" aria-expanded="false">
          <span class="material-symbols-outlined" aria-hidden="true">menu</span>
        </button>
        <button class="config-button header-action-button" @click="openModal('settings/settings.html')" title="Settings">
          <span class="material-symbols-outlined">settings</span>
        </button>
      </div>

      <!-- Dropdown Menu -->
      <div
        class="dropdown-menu quick-actions-dropdown"
        x-show="$store.sidebar.menuOpen"
        :style="$store.sidebar.dropdownStyle"
        @click.stop
      >
        <div id="sidebar-quick-actions-dropdown-slot-start"></div>

        <div class="dropdown-header">Navigation</div>

        <button class="dropdown-item" @click="deselectChat(); $store.sidebar.menuClose()">
          <span class="material-symbols-outlined">home</span>
          <span>Home</span>
        </button>

        <button class="dropdown-item" @click="chatsStore.newChat(); $store.sidebar.menuClose()">
          <span class="material-symbols-outlined">add_comment</span>
          <span>New Chat</span>
        </button>

        <button class="dropdown-item" @click="$store.projects.openProjectsModal(); $store.sidebar.menuClose()">
          <span class="material-symbols-outlined">snippet_folder</span>
          <span>Projects</span>
        </button>

        <button id="sidebar-files-dropdown" class="dropdown-item" @click="$store.chatInput.browseFiles(); $store.sidebar.menuClose()">
          <span class="material-symbols-outlined">folder</span>
          <span>Files</span>
        </button>

        <button class="dropdown-item" @click="ensureModalOpen('settings/tunnel/remote-link.html'); $store.sidebar.menuClose()">
          <span class="material-symbols-outlined">share</span>
          <span>Remote Link</span>
        </button>

        <button class="dropdown-item" @click="openModal('components/modals/scheduler/scheduler-modal.html'); $store.sidebar.menuClose()">
          <span class="material-symbols-outlined">schedule</span>
          <span>Tasks</span>
        </button>

        <div class="dropdown-separator"></div>

        <button class="dropdown-item" @click="openModal('settings/settings.html'); $store.sidebar.menuClose()">
          <span class="material-symbols-outlined">settings</span>
          <span>Settings</span>
        </button>

        <div class="dropdown-separator"></div>

        <button
          type="button"
          class="dropdown-item quick-actions-accordion-toggle"
          :class="{ 'is-open': $store.sidebar.isSectionOpen('chatActions') }"
          :aria-expanded="$store.sidebar.isSectionOpen('chatActions').toString()"
          @click="$store.sidebar.toggleSection('chatActions')"
        >
          <span class="quick-actions-accordion-label">
            <span class="material-symbols-outlined">forum</span>
            <span>Chat Actions</span>
          </span>
          <span class="material-symbols-outlined quick-actions-accordion-chevron">expand_more</span>
        </button>

        <div class="quick-actions-accordion-panel" x-show="$store.sidebar.isSectionOpen('chatActions')" style="display: none;">
          <button class="dropdown-item" @click="$store.chats.newChat(); $store.sidebar.menuClose()">
            <span class="material-symbols-outlined">chat_add_on</span>
            <span>New Chat</span>
          </button>

          <button class="dropdown-item" @click="$store.chats.loadChats(); $store.sidebar.menuClose()">
            <span class="material-symbols-outlined">folder_open</span>
            <span>Load Chat</span>
          </button>

          <button class="dropdown-item" x-show="$store.chats.selected" @click="$store.chats.saveChat(); $store.sidebar.menuClose()">
            <span class="material-symbols-outlined">save</span>
            <span>Save Chat</span>
          </button>

          <button class="dropdown-item" x-show="$store.chats.selected" @click="$confirmClick($event, () => { $store.chats.resetChat(); $store.sidebar.menuClose() })">
            <span class="material-symbols-outlined">delete_sweep</span>
            <span>Clear Chat</span>
          </button>
        </div>

        <div class="dropdown-separator"></div>

        <div id="sidebar-quick-actions-dropdown-slot-end"></div>
      </div>
    </div>
  </div>

  <style>
    :root {
      --header-panel-expanded-width: calc(250px - (var(--spacing-md) * 2));
      --header-panel-collapsed-width: 3.45rem;
    }

    .sidebar-header-panel {
      position: fixed;
      top: var(--spacing-md);
      left: var(--spacing-md);
      width: var(--header-panel-collapsed-width);
      box-sizing: border-box;
      z-index: 1004;
      display: flex;
      flex-direction: column;
      align-items: flex-start;
      gap: 2px;
      overflow: hidden;
    }

    .sidebar-header-panel-open {
      width: var(--header-panel-expanded-width);
    }

    #logo-bar {
      width: 100%;
      padding-bottom: 4px;
    }

    .logo-container {
      width: 100%;
      height: 1.64rem;
    }

    #bio-logo, #bio-logo-collapsed {
      display: block;
      width: 100%;
      height: 100%;
      background-size: contain;
      background-repeat: no-repeat;
      background-position: left center;
    }

    #bio-logo {
      background-image: url(/public/bio-full.svg);
    }

    #bio-logo-collapsed {
      background-image: url(/public/bio-collapsed.svg);
      width: 1.75rem;
      height: 1.75rem;
    }

    

    .section-header {
      width: 100%;
      padding: 4px 0 2px 0;
      border-bottom: 1px solid var(--border-color, #333);
    }

    .section-title {
      font-size: 0.65rem;
      font-weight: 600;
      color: var(--text-muted, #888);
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }

    .research-icons {
      display: flex;
      flex-direction: column;
      flex-wrap: nowrap;
      gap: 1px;
      align-items: stretch;
      width: 100%;
      max-height: calc(100vh - 12rem);
      overflow-y: auto;
    }

    .research-icons .header-action-button {
      flex-direction: row;
      justify-content: flex-start;
      padding: 5px 6px;
      gap: 6px;
      min-width: 100%;
      border-radius: 4px;
    }

    .research-icons .header-action-button .material-symbols-outlined {
      font-size: 1rem;
      flex-shrink: 0;
    }

    .research-icons .icon-label {
      font-size: 0.7rem;
      white-space: nowrap;
    }

    .primary-actions {
      display: flex;
      flex-direction: column;
      gap: 2px;
      width: 100%;
      margin: 4px 0;
    }

    .primary-actions .header-action-button {
      flex-direction: row;
      justify-content: flex-start;
      padding: 6px 8px;
      gap: 6px;
      min-width: 100%;
      border-radius: 4px;
      background: var(--color-primary, #00d4aa);
      color: white;
    }

    .primary-actions .header-action-button:hover {
      background: var(--color-primary-dark, #00a888);
    }

    .primary-actions .icon-label {
      font-size: 0.75rem;
    }

    .settings-row {
      display: flex;
      flex-direction: row;
      gap: 2px;
      width: 100%;
      margin-top: auto;
      padding-top: 4px;
      border-top: 1px solid var(--border-color, #333);
    }

    .settings-row .header-action-button {
      flex: 1;
      padding: 6px;
    }

    .header-action-button {
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 6px;
      background: transparent;
      border: none;
      border-radius: 6px;
      color: var(--text-secondary, #aaa);
      cursor: pointer;
      transition: all 0.2s ease;
    }

    .header-action-button:hover {
      background: var(--hover-bg, rgba(255,255,255,0.1));
      color: var(--text-primary, #fff);
    }

    .header-action-button .material-symbols-outlined {
      font-size: 1.15rem;
    }

    .dropdown-toggle .rotated {
      transform: rotate(180deg);
    }
  </style>
</body>
</html>
