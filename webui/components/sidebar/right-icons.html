<html>
<head>
  <script type="module">
    import { store as desktopStore } from "/components/desktop-workspace/desktop-store.js";
  </script>
</head>
<body>
  <div x-data>
    <template x-if="$store.desktopWorkspace && $store.desktopWorkspace.desktopLayout !== 'desktop'">
      <nav class="right-icon-rail" aria-label="Desktop tools">
        <template x-for="mod in $store.desktopWorkspace.sortedModules" :key="mod.id">
          <button
            class="right-icon-btn"
            :title="mod.title"
            @click="$store.desktopWorkspace.openWindow(mod.id)"
          >
            <span class="material-symbols-outlined" x-text="mod.icon"></span>
          </button>
        </template>
      </nav>
    </template>
  </div>

  <style>
    .right-icon-rail {
      position: fixed;
      right: 0;
      top: 50%;
      transform: translateY(-50%);
      display: flex;
      flex-direction: column;
      gap: 2px;
      padding: 6px 4px;
      background: color-mix(in srgb, var(--color-panel) 92%, transparent);
      border: 1px solid var(--color-border);
      border-right: none;
      border-radius: 10px 0 0 10px;
      z-index: 500;
      max-height: calc(100vh - 120px);
      overflow-y: auto;
      scrollbar-width: none;
      box-shadow: -4px 0 16px rgba(0, 0, 0, 0.15);
      backdrop-filter: blur(12px);
    }

    .right-icon-rail::-webkit-scrollbar {
      display: none;
    }

    .right-icon-btn {
      display: flex;
      align-items: center;
      justify-content: center;
      width: 36px;
      height: 36px;
      padding: 4px;
      border: none;
      border-radius: 8px;
      background: transparent;
      color: var(--color-text-muted);
      cursor: pointer;
      transition: all 0.15s ease;
      flex-shrink: 0;
    }

    .right-icon-btn:hover {
      background: color-mix(in srgb, var(--color-primary) 18%, transparent);
      color: var(--color-primary);
    }

    .right-icon-btn:active {
      transform: scale(0.92);
    }

    .right-icon-btn .material-symbols-outlined {
      font-size: 20px;
    }
  </style>
</body>
</html>
