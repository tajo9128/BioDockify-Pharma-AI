<html>
<head>
  <script type="module">
    import { store } from "/components/research/research-store.js";
  </script>
</head>
<body>
  <div x-data class="research-tools">
    <div class="section-header">
      <h2>Research Tools</h2>
      <p class="section-desc">Select a tool to open it in the canvas panel</p>
    </div>

    <div class="tool-grid">
      <button class="tool-card" @click="$store.rightCanvas.open('statistics')">
        <span class="material-symbols-outlined">analytics</span>
        <span>Statistics</span>
      </button>
      <button class="tool-card" @click="$store.rightCanvas.open('literature')">
        <span class="material-symbols-outlined">menu_book</span>
        <span>Literature</span>
      </button>
      <button class="tool-card" @click="$store.rightCanvas.open('thesis')">
        <span class="material-symbols-outlined">description</span>
        <span>Academic Writer</span>
      </button>
      <button class="tool-card" @click="$store.rightCanvas.open('slides')">
        <span class="material-symbols-outlined">slideshow</span>
        <span>Slides</span>
      </button>
      <button class="tool-card" @click="$store.rightCanvas.open('wetlab')">
        <span class="material-symbols-outlined">biotech</span>
        <span>Wet Lab</span>
      </button>
      <button class="tool-card" @click="$store.rightCanvas.open('knowledge')">
        <span class="material-symbols-outlined">psychology</span>
        <span>Knowledge</span>
      </button>
      <button class="tool-card" @click="$store.rightCanvas.open('agent-tasks')">
        <span class="material-symbols-outlined">psychology</span>
        <span>Agent Tasks</span>
      </button>
      <button class="tool-card" @click="$store.rightCanvas.open('drug-properties')">
        <span class="material-symbols-outlined">medication</span>
        <span>Drug Properties</span>
      </button>
      <button class="tool-card" @click="$store.rightCanvas.open('docking')">
        <span class="material-symbols-outlined">biotech</span>
        <span>Docking</span>
      </button>
    </div>

    <style>
      .research-tools { padding: var(--spacing-md); height: 100%; overflow-y: auto; }
      .section-header { margin-bottom: var(--spacing-md); }
      .section-header h2 { color: var(--color-primary); font-size: 1.1rem; margin: 0 0 4px 0; }
      .section-desc { color: var(--color-text-muted); font-size: 0.8rem; margin: 0; }
      .tool-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: var(--spacing-sm); }
      .tool-card { display: flex; flex-direction: column; align-items: center; gap: var(--spacing-xs); padding: 1rem; background: var(--color-panel); border: 1px solid var(--color-border); border-radius: 8px; cursor: pointer; transition: all 0.2s; }
      .tool-card:hover { background: var(--color-secondary); border-color: var(--color-primary); }
      .tool-card .material-symbols-outlined { font-size: 28px; color: var(--color-primary); }
      .tool-card span:last-child { font-size: 0.75rem; color: var(--color-text); }
    </style>
  </div>
</body>
</html>
