<html>
<head>
  <script type="module">
    import { createStore } from "/js/AlpineStore.js";
    import { callJsonApi } from "/js/api.js";

    export const store = createStore("lectureBuilder", {
      topic: "",
      duration: "60",
      level: "undergraduate",
      loading: false,
      result: null,
      error: "",

      async generate() {
        if (!this.topic.trim()) return;
        this.loading = true;
        this.error = "";
        this.result = null;
        try {
          const resp = await callJsonApi("lecture_generate", {
            topic: this.topic, duration: this.duration, level: this.level,
          });
          if (resp.error) { this.error = resp.error; return; }
          this.result = resp;
        } catch (e) { this.error = e.message; }
        this.loading = false;
      },

      clear() { this.topic = ""; this.result = null; this.error = ""; },
    });
  </script>
</head>
<body>
  <div x-data class="lecture-panel">
    <div class="panel-header">
      <span class="material-symbols-outlined panel-icon">school</span>
      <h2>Lecture Builder</h2>
    </div>
    <div class="panel-content">
      <div class="form-section">
        <div class="input-row">
          <input type="text" x-model="$store.lectureBuilder.topic" placeholder="Lecture topic..." class="topic-input" @keyup.enter="$store.lectureBuilder.generate()" />
          <button class="btn-gen" @click="$store.lectureBuilder.generate()" :disabled="$store.lectureBuilder.loading || !$store.lectureBuilder.topic">
            <span class="material-symbols-outlined">auto_awesome</span>
            Generate
          </button>
        </div>
        <div class="options-row">
          <div class="opt-group">
            <label class="opt-label">Duration (min)</label>
            <select x-model="$store.lectureBuilder.duration" class="opt-select">
              <option value="30">30 min</option>
              <option value="60">60 min</option>
              <option value="90">90 min</option>
              <option value="120">120 min</option>
            </select>
          </div>
          <div class="opt-group">
            <label class="opt-label">Level</label>
            <select x-model="$store.lectureBuilder.level" class="opt-select">
              <option value="undergraduate">Undergraduate</option>
              <option value="graduate">Graduate</option>
              <option value="pharmd">Pharm.D</option>
              <option value="phd">PhD</option>
            </select>
          </div>
        </div>
      </div>

      <div x-show="$store.lectureBuilder.error" class="error-banner" x-text="$store.lectureBuilder.error"></div>
      <div x-show="$store.lectureBuilder.loading" class="loading-bar"><div class="loading-spinner"></div><span>Generating lecture...</span></div>

      <template x-if="$store.lectureBuilder.result">
        <div class="results">
          <div class="results-header">
            <h3 x-text="$store.lectureBuilder.result.lecture?.title || $store.lectureBuilder.topic"></h3>
            <button class="act-btn" @click="$store.lectureBuilder.clear()"><span class="material-symbols-outlined">refresh</span>New</button>
          </div>

          <!-- Learning Objectives -->
          <div x-show="$store.lectureBuilder.result.lecture?.learning_objectives?.length" class="section-card">
            <h4>Learning Objectives</h4>
            <ul>
              <template x-for="obj in $store.lectureBuilder.result.lecture.learning_objectives" :key="obj">
                <li x-text="obj"></li>
              </template>
            </ul>
          </div>

          <!-- Sections -->
          <template x-if="$store.lectureBuilder.result.lecture?.sections">
            <div class="sections-list">
              <template x-for="sec in $store.lectureBuilder.result.lecture.sections" :key="sec.title">
                <div class="section-card">
                  <h4 x-text="sec.title"></h4>
                  <p x-text="sec.content || ''"></p>
                </div>
              </template>
            </div>
          </template>

          <!-- Summary -->
          <div x-show="$store.lectureBuilder.result.lecture?.summary" class="section-card summary">
            <h4>Summary</h4>
            <p x-text="$store.lectureBuilder.result.lecture.summary"></p>
          </div>

          <!-- Homework -->
          <template x-if="$store.lectureBuilder.result.homework?.length">
            <div class="section-card">
              <h4>Homework Assignments</h4>
              <ul>
                <template x-for="hw in $store.lectureBuilder.result.homework" :key="hw">
                  <li x-text="hw"></li>
                </template>
              </ul>
            </div>
          </template>

          <!-- Practical -->
          <template x-if="$store.lectureBuilder.result.practical">
            <div class="section-card">
              <h4>Lab Practical</h4>
              <p><strong x-text="$store.lectureBuilder.result.practical.title || ''"></strong></p>
              <p x-text="$store.lectureBuilder.result.practical.objective || ''"></p>
            </div>
          </template>

          <div class="agent-help">
            <button class="agent-help-btn" @click="const p=`Refine this lecture on ${$store.lectureBuilder.topic}. Add more examples and interactive elements.`; const el=document.querySelector('chat-input'); if(el){el.value=p;el.dispatchEvent(new Event('input',{bubbles:true}));el.focus()}">
              <span class="material-symbols-outlined">psychology</span>
              Agent: refine and add interactive elements
            </button>
          </div>
        </div>
      </template>

      <div x-show="!$store.lectureBuilder.result && !$store.lectureBuilder.loading" class="empty-state">
        <span class="material-symbols-outlined empty-icon">school</span>
        <p>Enter a topic to generate lecture materials</p>
        <div class="quick-chips">
          <button class="chip" @click="$store.lectureBuilder.topic='Pharmacokinetics of NSAIDs'; $store.lectureBuilder.generate()">PK of NSAIDs</button>
          <button class="chip" @click="$store.lectureBuilder.topic='Drug-receptor interactions'; $store.lectureBuilder.generate()">Drug receptors</button>
          <button class="chip" @click="$store.lectureBuilder.topic='HPLC method development'; $store.lectureBuilder.generate()">HPLC methods</button>
        </div>
      </div>
    </div>

    <style>
      .lecture-panel { display: flex; flex-direction: column; height: 100%; overflow-y: auto; padding: 16px 20px; background: var(--color-background); }
      .panel-header { display: flex; align-items: center; gap: 10px; margin-bottom: 14px; }
      .panel-icon { font-size: 26px; color: var(--color-primary); }
      .panel-header h2 { color: var(--color-primary); font-size: 1rem; margin: 0; font-weight: 700; }
      .panel-content { flex: 1; }
      .form-section { margin-bottom: 14px; }
      .input-row { display: flex; gap: 8px; margin-bottom: 8px; }
      .topic-input { flex: 1; padding: 9px 12px; border: 1px solid var(--color-border); border-radius: 8px; background: var(--color-panel); color: var(--color-text); font-size: 0.78rem; }
      .topic-input:focus { outline: none; border-color: var(--color-primary); }
      .btn-gen { display: flex; align-items: center; gap: 4px; padding: 9px 14px; background: var(--color-primary); color: white; border: none; border-radius: 8px; cursor: pointer; font-size: 0.75rem; font-weight: 600; white-space: nowrap; }
      .btn-gen:disabled { opacity: 0.5; cursor: not-allowed; }
      .options-row { display: flex; gap: 8px; }
      .opt-group { flex: 1; min-width: 100px; }
      .opt-label { display: block; font-size: 0.62rem; font-weight: 600; color: var(--color-text-muted); margin-bottom: 2px; }
      .opt-select { width: 100%; padding: 5px 8px; border: 1px solid var(--color-border); border-radius: 6px; background: var(--color-panel); color: var(--color-text); font-size: 0.7rem; }
      .error-banner { padding: 6px 10px; background: rgba(255,107,107,0.1); border-radius: 6px; color: var(--color-error-text); font-size: 0.7rem; margin-bottom: 10px; }
      .loading-bar { display: flex; align-items: center; gap: 8px; font-size: 0.7rem; color: var(--color-text-muted); }
      .loading-spinner { width: 14px; height: 14px; border: 2px solid var(--color-border); border-top: 2px solid var(--color-primary); border-radius: 50%; animation: spin 0.8s linear infinite; }
      @keyframes spin { to { transform: rotate(360deg); } }
      .results { margin-top: 8px; }
      .results-header { display: flex; justify-content: space-between; align-items: center; gap: 8px; margin-bottom: 10px; }
      .results-header h3 { font-size: 0.82rem; font-weight: 700; color: var(--color-text); margin: 0; }
      .act-btn { display: flex; align-items: center; gap: 3px; padding: 4px 10px; background: var(--color-panel); border: 1px solid var(--color-border); border-radius: 6px; font-size: 0.65rem; color: var(--color-text); cursor: pointer; }
      .act-btn:hover { border-color: var(--color-primary); }
      .section-card { padding: 10px 14px; background: var(--color-panel); border: 1px solid var(--color-border); border-radius: 8px; margin-bottom: 8px; }
      .section-card h4 { font-size: 0.72rem; font-weight: 600; color: var(--color-primary); margin: 0 0 6px 0; }
      .section-card p, .section-card li { font-size: 0.7rem; color: var(--color-text-muted); line-height: 1.5; margin: 2px 0; }
      .section-card ul { margin: 0; padding-left: 16px; }
      .section-card.summary { background: color-mix(in srgb, var(--color-primary) 6%, var(--color-panel)); border-color: color-mix(in srgb, var(--color-primary) 20%, var(--color-border)); }
      .sections-list { display: flex; flex-direction: column; gap: 6px; }
      .agent-help { margin-top: 12px; }
      .agent-help-btn { display: flex; align-items: center; gap: 4px; padding: 8px 12px; background: color-mix(in srgb, var(--color-accent, #4fc3f7) 8%, var(--color-panel)); border: 1px solid color-mix(in srgb, var(--color-accent, #4fc3f7) 25%, var(--color-border)); border-radius: 8px; color: var(--color-text); cursor: pointer; font-size: 0.68rem; width: 100%; justify-content: center; }
      .empty-state { display: flex; flex-direction: column; align-items: center; padding: 36px 20px; text-align: center; }
      .empty-icon { font-size: 40px; color: var(--color-border); margin-bottom: 10px; }
      .empty-state p { color: var(--color-text-muted); font-size: 0.75rem; margin: 0 0 10px 0; }
      .quick-chips { display: flex; flex-wrap: wrap; gap: 5px; justify-content: center; }
      .chip { padding: 5px 10px; background: var(--color-panel); border: 1px solid var(--color-border); border-radius: 6px; font-size: 0.68rem; color: var(--color-text); cursor: pointer; }
      .chip:hover { border-color: var(--color-primary); }
    </style>
  </div>
</body>
</html>
