<html>
<head>
  <script type="module">
    import { store } from "/components/knowledge/knowledge-store.js";
  </script>
</head>
<body>
  <div x-data class="knowledge-modal">
    <div class="modal-header">
      <h2>Knowledge Base</h2>
    </div>

    <div class="modal-content">
      <div class="search-bar">
        <input type="text" x-model="$store.knowledgeModal.searchQuery" placeholder="Search knowledge base..." class="search-input" @keyup.enter="$store.knowledgeModal.search()" />
        <button class="search-btn" @click="$store.knowledgeModal.search()">Search</button>
      </div>

      <div class="add-entry">
        <h3>Add Entry</h3>
        <div class="entry-form">
          <input type="text" x-model="$store.knowledgeModal.newEntry.question" placeholder="Question / Concept" class="entry-input" />
          <textarea x-model="$store.knowledgeModal.newEntry.answer" placeholder="Answer / Description" class="entry-textarea"></textarea>
          <button class="add-btn" @click="$store.knowledgeModal.addEntry()">Add</button>
        </div>
      </div>

      <div class="entries-list">
        <h3>Entries (<span x-text="$store.knowledgeModal.entries.length"></span>)</h3>
        <template x-for="entry in $store.knowledgeModal.entries">
          <div class="entry-item">
            <div class="entry-question" x-text="entry.question"></div>
            <div class="entry-answer" x-text="entry.answer"></div>
            <button class="delete-btn" @click="$store.knowledgeModal.deleteEntry(entry)">Delete</button>
          </div>
        </template>
        <div x-show="!$store.knowledgeModal.entries.length" class="no-entries">No knowledge entries</div>
      </div>

      <div class="export-area">
        <button class="export-btn" @click="$store.knowledgeModal.exportJson()">Export JSON</button>
      </div>
    </div>

    <style>
      .knowledge-modal { padding: var(--spacing-md); max-width: 800px; }
      .modal-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: var(--spacing-md); }
      .modal-header h2 { color: var(--color-primary); }
      .search-bar { display: flex; gap: var(--spacing-sm); margin-bottom: var(--spacing-md); }
      .search-input { flex: 1; padding: var(--spacing-sm); border: 1px solid var(--color-border); border-radius: 4px; background: var(--color-panel); color: var(--color-text); }
      .search-btn { padding: var(--spacing-sm) var(--spacing-md); background: var(--color-primary); color: white; border: none; border-radius: 4px; cursor: pointer; }
      .add-entry h3 { color: var(--color-text); margin-bottom: var(--spacing-sm); }
      .entry-form { display: flex; flex-direction: column; gap: var(--spacing-xs); margin-bottom: var(--spacing-md); }
      .entry-input { padding: var(--spacing-sm); border: 1px solid var(--color-border); border-radius: 4px; background: var(--color-panel); color: var(--color-text); }
      .entry-textarea { padding: var(--spacing-sm); border: 1px solid var(--color-border); border-radius: 4px; background: var(--color-panel); color: var(--color-text); min-height: 60px; resize: vertical; }
      .add-btn { padding: var(--spacing-sm) var(--spacing-md); background: var(--color-primary); color: white; border: none; border-radius: 4px; cursor: pointer; align-self: flex-end; }
      .entries-list h3 { color: var(--color-text); margin-bottom: var(--spacing-sm); }
      .entry-item { padding: var(--spacing-sm); border-bottom: 1px solid var(--color-border); display: flex; justify-content: space-between; align-items: flex-start; gap: var(--spacing-sm); }
      .entry-question { color: var(--color-primary); font-weight: 600; }
      .entry-answer { color: var(--color-text); font-size: 12px; margin-top: var(--spacing-xs); }
      .delete-btn { background: none; border: none; color: var(--color-text-muted); cursor: pointer; flex-shrink: 0; }
      .no-entries { color: var(--color-text-muted); padding: var(--spacing-md); text-align: center; }
      .export-area { margin-top: var(--spacing-md); }
      .export-btn { padding: var(--spacing-sm) var(--spacing-md); background: var(--color-primary); color: white; border: none; border-radius: 4px; cursor: pointer; }
    </style>
  </div>
</body>
</html>
