<html>
<head>
  <script type="module">
    import { store } from "/components/knowledge/knowledge-store.js";
  </script>
</head>
<body>
  <div x-data class="knowledge-modal">
    <div class="modal-header">
      <h2>Knowledge Base</h2>
    </div>

    <div class="toolbar">
      <button class="upload-btn" @click="$store.knowledgeModal.triggerFileUpload()" :disabled="$store.knowledgeModal.uploading">
        <span class="material-symbols-outlined">upload_file</span>
        <span x-text="$store.knowledgeModal.uploading ? 'Uploading...' : 'Upload Files'"></span>
      </button>
    </div>

    <div class="modal-content">
      <div class="search-bar">
        <input type="text" x-model="$store.knowledgeModal.searchQuery" placeholder="Search knowledge base..." class="search-input" @keyup.enter="$store.knowledgeModal.search()" />
        <button class="search-btn" @click="$store.knowledgeModal.search()">Search</button>
      </div>

      <div x-show="$store.knowledgeModal.searchResults.length" class="search-results">
        <h3>Search Results</h3>
        <template x-for="result in $store.knowledgeModal.searchResults">
          <div class="result-item">
            <div class="result-title" x-text="result.title || result.content?.substring(0, 100)"></div>
            <div class="result-snippet" x-text="(result.content || '').substring(0, 300)"></div>
          </div>
        </template>
      </div>

      <div x-show="$store.knowledgeModal.error" class="error-msg" x-text="$store.knowledgeModal.error"></div>

      <div class="add-entry">
        <h3>Quick Entry</h3>
        <div class="entry-form">
          <input type="text" x-model="$store.knowledgeModal.newEntry.question" placeholder="Question / Concept" class="entry-input" />
          <textarea x-model="$store.knowledgeModal.newEntry.answer" placeholder="Answer / Description" class="entry-textarea"></textarea>
          <button class="add-btn" @click="$store.knowledgeModal.addEntry()">Add</button>
        </div>
      </div>

      <div class="entries-list">
        <h3>Local Entries (<span x-text="$store.knowledgeModal.entries.length"></span>)</h3>
        <template x-for="entry in $store.knowledgeModal.entries">
          <div class="entry-item">
            <div class="entry-question" x-text="entry.question"></div>
            <div class="entry-answer" x-text="entry.answer"></div>
            <button class="delete-btn" @click="$store.knowledgeModal.deleteEntry(entry)">×</button>
          </div>
        </template>
        <div x-show="!$store.knowledgeModal.entries.length" class="no-entries">No entries yet. Upload files or add manually.</div>
      </div>

      <div class="export-area">
        <button class="export-btn" @click="$store.knowledgeModal.exportJson()">Export JSON</button>
      </div>
    </div>

    <style>
      .knowledge-modal { padding: var(--spacing-md); max-width: 800px; height: 100%; overflow-y: auto; }
      .modal-header { margin-bottom: var(--spacing-sm); }
      .modal-header h2 { color: var(--color-primary); font-size: 1.1rem; margin: 0; }
      .toolbar { margin-bottom: var(--spacing-md); }
      .upload-btn { display: flex; align-items: center; gap: 6px; padding: 8px 16px; background: var(--color-primary); color: white; border: none; border-radius: 6px; cursor: pointer; font-size: 0.85rem; }
      .upload-btn:disabled { opacity: 0.6; cursor: not-allowed; }
      .upload-btn:hover:not(:disabled) { opacity: 0.9; }
      .search-bar { display: flex; gap: var(--spacing-sm); margin-bottom: var(--spacing-md); }
      .search-input { flex: 1; padding: var(--spacing-sm); border: 1px solid var(--color-border); border-radius: 4px; background: var(--color-panel); color: var(--color-text); font-size: 0.85rem; }
      .search-btn { padding: var(--spacing-sm) var(--spacing-md); background: var(--color-primary); color: white; border: none; border-radius: 4px; cursor: pointer; font-size: 0.85rem; }
      .search-results { margin-bottom: var(--spacing-md); }
      .search-results h3 { font-size: 0.85rem; color: var(--color-text); margin-bottom: var(--spacing-xs); }
      .result-item { padding: var(--spacing-sm); background: var(--color-panel); border: 1px solid var(--color-border); border-radius: 4px; margin-bottom: var(--spacing-xs); }
      .result-title { color: var(--color-primary); font-weight: 600; font-size: 0.8rem; }
      .result-snippet { color: var(--color-text-muted); font-size: 0.75rem; margin-top: 2px; }
      .error-msg { color: var(--color-error-text, #ff6b6b); font-size: 0.8rem; padding: var(--spacing-xs); margin-bottom: var(--spacing-sm); }
      .add-entry h3 { font-size: 0.85rem; color: var(--color-text); margin-bottom: var(--spacing-xs); }
      .entry-form { display: flex; flex-direction: column; gap: var(--spacing-xs); margin-bottom: var(--spacing-md); }
      .entry-input { padding: var(--spacing-sm); border: 1px solid var(--color-border); border-radius: 4px; background: var(--color-panel); color: var(--color-text); font-size: 0.85rem; }
      .entry-textarea { padding: var(--spacing-sm); border: 1px solid var(--color-border); border-radius: 4px; background: var(--color-panel); color: var(--color-text); min-height: 50px; resize: vertical; font-size: 0.85rem; }
      .add-btn { padding: var(--spacing-xs) var(--spacing-md); background: var(--color-primary); color: white; border: none; border-radius: 4px; cursor: pointer; font-size: 0.85rem; align-self: flex-end; }
      .entries-list h3 { font-size: 0.85rem; color: var(--color-text); margin-bottom: var(--spacing-xs); }
      .entry-item { padding: var(--spacing-xs); border-bottom: 1px solid var(--color-border); display: flex; justify-content: space-between; align-items: flex-start; gap: var(--spacing-sm); }
      .entry-question { color: var(--color-primary); font-weight: 600; font-size: 0.8rem; }
      .entry-answer { color: var(--color-text); font-size: 0.75rem; }
      .delete-btn { background: none; border: none; color: var(--color-text-muted); cursor: pointer; flex-shrink: 0; font-size: 1rem; }
      .no-entries { color: var(--color-text-muted); padding: var(--spacing-md); text-align: center; font-size: 0.85rem; }
      .export-area { margin-top: var(--spacing-md); }
      .export-btn { padding: var(--spacing-xs) var(--spacing-md); background: var(--color-panel); border: 1px solid var(--color-border); border-radius: 4px; cursor: pointer; color: var(--color-text); font-size: 0.85rem; }
    </style>
  </div>
</body>
</html>
