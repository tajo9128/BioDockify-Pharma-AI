<html>
<head>
  <script type="module" src="/components/statistics/statistics-store.js"></script>
</head>
<body>
  <div x-data="statisticsModal" class="statistics-modal">
    <div class="modal-header">
      <h2>BioDockify Statistics</h2>
    </div>

    <div class="toolbar">
      <button class="upload-btn" @click="importData()">
        <span class="material-symbols-outlined">upload_file</span>
        <span>Import Data (CSV/Excel)</span>
      </button>
    </div>

    <div class="modal-content">
      <div class="analysis-types">
        <h3>Statistical Analysis</h3>

        <div class="analysis-grid">
          <button class="analysis-card" @click="runDescriptive()" :disabled="loading">
            <span class="material-symbols-outlined">functions</span>
            <span>Descriptive</span>
          </button>

          <button class="analysis-card" @click="runTTest()" :disabled="loading">
            <span class="material-symbols-outlined">compare_arrows</span>
            <span>T-Test</span>
          </button>

          <button class="analysis-card" @click="runAnova()" :disabled="loading">
            <span class="material-symbols-outlined">grid_view</span>
            <span>ANOVA</span>
          </button>

          <button class="analysis-card" @click="runCorrelation()" :disabled="loading">
            <span class="material-symbols-outlined">show_chart</span>
            <span>Correlation</span>
          </button>

          <button class="analysis-card" @click="runRegression()" :disabled="loading">
            <span class="material-symbols-outlined">trend</span>
            <span>Regression</span>
          </button>

          <button class="analysis-card" @click="runSurvival()" :disabled="loading">
            <span class="material-symbols-outlined">timeline</span>
            <span>Survival</span>
          </button>

          <button class="analysis-card" @click="runPower()" :disabled="loading">
            <span class="material-symbols-outlined">bolt</span>
            <span>Power Analysis</span>
          </button>

          <button class="analysis-card" @click="runPKPD()" :disabled="loading">
            <span class="material-symbols-outlined">science</span>
            <span>PK/PD</span>
          </button>
        </div>
      </div>

      <div class="results-area" x-show="results || loading">
        <h3>
          <span x-show="!loading">Results</span>
          <span x-show="loading" class="loading-text">
            <span class="material-symbols-outlined spinning">progress_activity</span>
            Processing...
          </span>
        </h3>
        <pre x-show="results" x-text="results"></pre>
      </div>
    </div>

    <style>
      .statistics-modal { padding: var(--spacing-md); max-width: 800px; height: 100%; overflow-y: auto; }
      .modal-header { margin-bottom: var(--spacing-sm); }
      .modal-header h2 { color: var(--color-primary); font-size: 1.1rem; margin: 0; }
      .toolbar { margin-bottom: var(--spacing-md); }
      .upload-btn { display: flex; align-items: center; gap: 6px; padding: 8px 16px; background: var(--color-primary); color: white; border: none; border-radius: 6px; cursor: pointer; font-size: 0.85rem; }
      .upload-btn:hover { opacity: 0.9; }
      .analysis-types h3 { color: var(--color-text); font-size: 0.85rem; margin-bottom: var(--spacing-sm); }
      .analysis-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: var(--spacing-xs); }
      .analysis-card { display: flex; flex-direction: column; align-items: center; padding: 10px 8px; background: var(--color-panel); border: 1px solid var(--color-border); border-radius: 6px; cursor: pointer; transition: all 0.2s; }
      .analysis-card:hover { background: var(--color-secondary); border-color: var(--color-primary); }
      .analysis-card:disabled { opacity: 0.5; cursor: not-allowed; }
      .analysis-card .material-symbols-outlined { font-size: 24px; color: var(--color-primary); margin-bottom: 2px; }
      .analysis-card span:last-child { font-size: 0.7rem; color: var(--color-text); }
      .results-area { margin-top: var(--spacing-md); padding: var(--spacing-md); background: var(--color-panel); border-radius: 6px; border: 1px solid var(--color-border); }
      .results-area h3 { font-size: 0.85rem; color: var(--color-text); margin: 0 0 var(--spacing-xs) 0; }
      .results-area pre { white-space: pre-wrap; font-family: var(--font-mono); font-size: 0.75rem; color: var(--color-text); margin: 0; max-height: 400px; overflow-y: auto; }
      .loading-text { display: flex; align-items: center; gap: 6px; color: var(--color-text-muted); }
      .spinning { animation: spin 1s linear infinite; font-size: 1rem; }
      @keyframes spin { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }
    </style>
  </div>
</body>
</html>
