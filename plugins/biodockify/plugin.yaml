name: biodockify
description: BioDockify AI - Pharmaceutical Research Platform
version: 1.0.0
settings_sections:
  - name: research
    title: Research Configuration
    settings:
      - name: default_model
        type: select
        label: Default Research Model
        default: anthropic/claude-sonnet-4-20250514
        options:
          - anthropic/claude-sonnet-4-20250514
          - openai/gpt-4o
          - google/gemini-2.5-pro-preview-070
      - name: literature_databases
        type: multiselect
        label: Enabled Literature Databases
        default:
          - pubmed
          - semantic_scholar
        options:
          - pubmed
          - semantic_scholar
          - europepmc
          - crossref
          - biorxiv
          - pubchem
          - scopus
          - wos
      - name: statistics_default
        type: select
        label: Default Statistical Method
        default: ttest
        options:
          - ttest
          - anova
          - regression
          - correlation
  - name: subagents
    title: Sub-Agent Configuration
    settings:
      - name: researcher_enabled
        type: boolean
        label: Enable Researcher Agent
        default: true
      - name: biostatistician_enabled
        type: boolean
        label: Enable Biostatistician Agent
        default: true
      - name: writer_enabled
        type: boolean
        label: Enable Writer Agent
        default: true
      - name: hacker_enabled
        type: boolean
        label: Enable Hacker Agent
        default: true