name: Build and Push Docker Image

on:
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      force_version:
        description: "Force specific version (e.g. v1.0.8). Leaves empty for auto-increment."
        required: false
        type: string

env:
  REGISTRY: docker.io
  IMAGE_NAME: tajo9128/biodockify-pharma-ai

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      packages: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Get or create version
        id: version
        run: |
          if [ -n "${{ github.event.inputs.force_version }}" ]; then
            VERSION="${{ github.event.inputs.force_version }}"
          else
            # Get latest tag
            git fetch --tags origin
            LAST_TAG=$(git tag --sort=-version:refname | grep -E '^v[0-9]+\.[0-9]+' | head -1 | sed 's/^v//')
            if [ -z "$LAST_TAG" ]; then
              LAST_TAG="0.0"
            fi
            # Increment minor version
            MAJOR=$(echo $LAST_TAG | cut -d. -f1)
            MINOR=$(echo $LAST_TAG | cut -d. -f2)
            MINOR=$((MINOR + 1))
            VERSION="v$MAJOR.$MINOR"
          fi
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "Creating version: $VERSION"

      - name: Create annotated tag
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git tag -d ${{ steps.version.outputs.version }} 2>/dev/null || true
          git push origin :refs/tags/${{ steps.version.outputs.version }} 2>/dev/null || true
          git tag -a ${{ steps.version.outputs.version }} -m "Release ${{ steps.version.outputs.version }}"
          git push origin ${{ steps.version.outputs.version }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./Dockerfile.release
          push: true
          no-cache: true
          tags: |
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ steps.version.outputs.version }}
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:latest
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:dev
          labels: |
            org.opencontainers.image.title=BioDockify AI
            org.opencontainers.image.description=Pharma research distribution of BioDockify AI
            org.opencontainers.image.source=${{ github.server_url }}/${{ github.repository }}

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.version }}
          body: |
            ## BioDockify AI ${{ steps.version.outputs.version }}

            **Pharma research distribution of [BioDockify AI](https://github.com/agent0ai/biodockify.ai)**

            ### Docker
            ```bash
            docker pull ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ steps.version.outputs.version }}
            docker run -d -p 80:80 -v biodockify_usr:/usr --name biodockify ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ steps.version.outputs.version }}
            ```
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}