version: '3.8'

services:
  biodockify-pharma-ai:
    image: tajo9128/biodockify-pharma-ai:v4.1.7
    container_name: biodockify-pharma-ai
    ports:
      - "3000:3000"
    volumes:
      # CRITICAL: ALL user data (memory, chats, settings, knowledge, projects) stored here
      # This volume persists across container deletion/recreation
      - biodockify_pharma_usr:/a0/usr
      # Optional: mount a local folder for easy file exchange
      # - ./workdir:/a0/usr/workdir
    environment:
      - PORT=3000
      # Optional: configure Ollama if running locally
      # - OLLAMA_URL=http://host.docker.internal:11434
    extra_hosts:
      - "host.docker.internal:host-gateway"
    restart: unless-stopped

volumes:
  biodockify_pharma_usr:
    # Docker named volume — persists on your machine at:
    # Windows: \\wsl$\docker-desktop-data\version-pack-data\community\docker\volumes\biodockify_pharma_usr\_data
    # macOS/Linux: /var/lib/docker/volumes/biodockify_pharma_usr/_data
    name: biodockify_pharma_usr
