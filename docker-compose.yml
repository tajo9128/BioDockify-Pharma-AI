# BioDockify AI - Docker Desktop Configuration
# ============================================
# For Windows Desktop: BioDockify (Docker) + Ollama (Windows native) on SAME machine
#
# Prerequisites:
# 1. Ollama must listen on 0.0.0.0 (not 127.0.0.1):
#    Run in PowerShell: $env:OLLAMA_HOST="0.0.0.0:11434"; ollama serve
#    Or set OLLAMA_HOST=0.0.0.0:11434 in system environment
# 2. Download model: ollama pull llama3.2
# 3. Enable Docker Desktop: Settings → Network → Enable host.docker.internal
#
version: '3.8'

services:
  biodockify:
    image: tajo9128/biodockify-ai:latest
    container_name: biodockify-ai
    ports:
      - "3000:3000"
    volumes:
      - ./data:/app/data
    environment:
      # Windows Desktop: use host.docker.internal (Docker's DNS for host machine)
      - OLLAMA_URL=http://host.docker.internal:11434
      - PORT=3000
      - NODE_ENV=production
      - DEFAULT_PROVIDER=ollama
    extra_hosts:
      - "host.docker.internal:host-gateway"
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3000/health"]
      interval: 30s
      timeout: 10s
      retries: 3

volumes:
  data: